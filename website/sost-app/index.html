<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOST">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SOST Protocol</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Courier New','Lucida Console',monospace}

/* SPLASH — Red Matrix Rain */
#splash.out{opacity:0;pointer-events:none;transition:opacity .5s ease}
#splash-logo{width:180px;height:180px;border-radius:20%;opacity:0;transition:opacity 1.5s ease-in,filter 1.5s ease-in;filter:drop-shadow(0 0 0px rgba(251,1,13,0))}
#splash-title{margin-top:20px;font-size:22px;font-weight:700;letter-spacing:4px;text-align:center;opacity:0;white-space:nowrap}
#splash-lines{margin-top:28px;font-size:13px;min-height:80px;text-align:left;width:320px}
.tl{opacity:0;overflow:hidden;white-space:nowrap;border-right:2px solid #aa0000;width:0;line-height:2}
.tl.go{animation:typeW .5s steps(30) forwards}
@keyframes typeW{from{opacity:1;width:0}to{opacity:1;width:100%}}

/* APP */
#app{flex-direction:column;height:100%}
.frames{flex:1;position:relative;overflow:hidden}
.frames iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}

/* LOADING OVERLAY */
.lov{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
.lov.gone{opacity:0;pointer-events:none}
.lov-logo{width:120px;height:120px;border-radius:20%;filter:drop-shadow(0 0 12px rgba(204,0,0,.5));transition:transform .15s ease-out}
.lov-num{font-size:28px;color:#fff;font-weight:700;font-family:inherit;margin-top:16px}
.lov-label{margin-top:10px;font-size:14px;letter-spacing:2px;font-weight:600;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.lov-label.ok{animation:none;opacity:1}

/* NAV — 5 buttons */
.bar{display:flex;height:62px;background:#0a0a0a;border-top:1px solid #222;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;z-index:100;position:relative}
.bar::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,.12) 1px,rgba(0,0,0,.12) 2px);pointer-events:none;opacity:.5}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#555;transition:all .15s;font-size:9px;letter-spacing:1px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;user-select:none;position:relative}
.nb .i{font-size:20px;margin-bottom:2px;transition:all .15s}
.nb:active{transform:scale(.92)}
.nb.on-ex{color:#00ff88}.nb.on-ex .i{text-shadow:0 0 10px rgba(0,255,136,.5)}
.nb.on-wb{color:#00e5ff}.nb.on-wb .i{text-shadow:0 0 10px rgba(0,229,255,.5)}
.nb.on-wl{color:#cc0000}.nb.on-wl .i{text-shadow:0 0 10px rgba(204,0,0,.5)}
.nb.on-dl{color:#00ff88}.nb.on-dl .i{text-shadow:0 0 10px rgba(0,255,136,.5)}
.nb.dl-off{color:#333;pointer-events:none}
.nb.xt-btn{color:#666}.nb.xt-btn:active{color:#cc0000}

/* Tab fade */
.frames.fading{opacity:0;transition:opacity .35s ease}
.frames.visible{opacity:1;transition:opacity .35s ease}
</style>
</head>
<body>

<!-- SPLASH — Red Matrix Rain -->
<div id="splash" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;background:#000;">
  <canvas id="matrix-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas>
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);z-index:10;text-align:center;pointer-events:none">
    <img id="splash-logo" src="/sost-logo.png" alt="SOST">
    <div id="splash-title"></div>
    <div id="splash-lines">
      <div class="tl" id="s1"><span style="color:#aa0000">&gt;</span><span style="color:#cc0000"> Initializing node connection...</span></div>
      <div class="tl" id="s2"><span style="color:#aa0000">&gt;</span><span style="color:#cc0000"> Verifying genesis block...</span></div>
      <div class="tl" id="s3"><span style="color:#aa0000">&gt;</span><span style="color:#cc0000"> Syncing chain data...</span></div>
      <div class="tl" id="s4"><span style="color:#aa0000">&gt;</span><span style="color:#cc0000"> System ready.</span></div>
    </div>
  </div>
  <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:20"></div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="frames visible" id="fr">
    <iframe id="ef" style="display:block"></iframe>
    <iframe id="wf" style="display:none"></iframe>
    <div class="lov" id="lov-ex">
      <img class="lov-logo" id="lov-logo" src="/sost-logo.png" alt="SOST">
      <div class="lov-num" id="lov-num">60</div>
      <div class="lov-label" id="lov-label" style="color:#00ff88">LOADING DATA...</div>
    </div>
  </div>
  <nav class="bar">
    <div class="nb on-ex" id="be" onclick="go('explorer')"><span class="i">⛓</span>EXPLORER</div>
    <div class="nb" id="bweb" onclick="openWeb()"><span class="i">🌐</span>WEB</div>
    <div class="nb dl-off" id="bdl" onclick="dl()"><span class="i">📥</span><span id="bdl-text">INSTALL</span></div>
    <div class="nb xt-btn" onclick="xt()"><span class="i">✕</span>EXIT</div>
    <div class="nb" id="bw" onclick="go('wallet')"><span class="i">🔐</span>WALLET</div>
  </nav>
</div>

<script src="/js/retro-sounds.js"></script>
<script>
/* ===== RED MATRIX RAIN SPLASH ===== */
(function(){
  var canvas=document.getElementById('matrix-canvas');
  var ctx=canvas.getContext('2d');
  var W,H,columns,drops,fontSize=14;
  var chars='アイウエオカキクケコサシスセソタチツテト0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@&'.split('');
  function initMatrix(){
    W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;
    if(W<600)fontSize=10;
    columns=Math.floor(W/fontSize);
    drops=[];for(var i=0;i<columns;i++)drops[i]=Math.random()*-50|0;
  }
  initMatrix();window.addEventListener('resize',initMatrix);
  var matrixOn=true;
  function drawMatrix(){
    if(!matrixOn)return;
    ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,W,H);
    ctx.font=fontSize+'px monospace';
    for(var i=0;i<drops.length;i++){
      var ch=chars[Math.random()*chars.length|0];
      var y=drops[i]*fontSize;
      ctx.fillStyle='#ffffff';ctx.fillText(ch,i*fontSize,y);
      if(drops[i]>1){ctx.fillStyle='#fb010d';ctx.fillText(chars[Math.random()*chars.length|0],i*fontSize,(drops[i]-1)*fontSize);}
      if(drops[i]>3){ctx.fillStyle=Math.random()>.5?'#cc0000':'#880000';ctx.fillText(chars[Math.random()*chars.length|0],i*fontSize,(drops[i]-2-Math.random()*2|0)*fontSize);}
      if(y>H&&Math.random()>.975)drops[i]=0;drops[i]++;
    }
    requestAnimationFrame(drawMatrix);
  }
  requestAnimationFrame(drawMatrix);

  // Logo emerge
  var logo=document.getElementById('splash-logo');
  setTimeout(function(){logo.style.opacity='0.15';},1500);
  setTimeout(function(){logo.style.opacity='0.4';logo.style.filter='drop-shadow(0 0 10px rgba(251,1,13,0.3))';},2000);
  setTimeout(function(){logo.style.opacity='0.7';logo.style.filter='drop-shadow(0 0 20px rgba(251,1,13,0.5))';},2500);
  setTimeout(function(){logo.style.opacity='1';logo.style.filter='drop-shadow(0 0 30px rgba(251,1,13,0.6)) drop-shadow(0 0 60px rgba(251,1,13,0.3))';},3000);

  // Title typing
  var titleEl=document.getElementById('splash-title');
  var titleParts=[{t:'SOST',c:'#fb010d'},{t:' PROTOCOL',c:'#ffffff'}];
  var ci=0,si=0;
  function typeT(){
    if(si>=titleParts.length)return;
    var seg=titleParts[si];
    if(ci<seg.t.length){
      var s=document.createElement('span');s.style.color=seg.c;s.style.textShadow='0 0 10px rgba(251,1,13,0.5)';
      s.textContent=seg.t[ci];titleEl.appendChild(s);titleEl.style.opacity='1';ci++;setTimeout(typeT,80);
    }else{ci=0;si++;setTimeout(typeT,40);}
  }
  setTimeout(typeT,3500);

  // Terminal lines
  ['s1','s2','s3','s4'].forEach(function(id,i){
    setTimeout(function(){var e=document.getElementById(id);if(e)e.classList.add('go');},5000+i*700);
  });
})();

// Chiptune
try{if(typeof playRetroSplashMusic==='function')playRetroSplashMusic(8);}catch(e){}

// Transition at 8s
setTimeout(function(){
  var appEl=document.getElementById('app');
  appEl.style.display='flex';
  document.getElementById('ef').src='/sost-explorer.html';
  document.getElementById('wf').src='/sost-wallet.html';
  setTimeout(function(){
    document.getElementById('splash').classList.add('out');
    initLoading();
    setTimeout(function(){document.getElementById('splash').style.display='none';},600);
  },100);
},8000);

/* ===== LOADING ===== */
var exLoaded=false;
var cdTimer=null;
var dtTimer=null;
var logoAngle=0;

function checkExplorerLoaded(){
  try{
    var iframe=document.getElementById('ef');
    if(!iframe||!iframe.contentDocument||!iframe.contentDocument.body)return false;
    var text=iframe.contentDocument.body.innerText||'';
    return /\d{2,}\.\d+\s*SOST/.test(text)&&/#\d{2,}/.test(text);
  }catch(e){return false;}
}

function initLoading(){
  if(exLoaded)return;
  var ov=document.getElementById('lov-ex');
  var logo=document.getElementById('lov-logo');
  var num=document.getElementById('lov-num');
  var lbl=document.getElementById('lov-label');
  ov.classList.remove('gone');
  var startTime=Date.now();
  var elapsed=0;
  logoAngle=0;
  if(cdTimer)clearInterval(cdTimer);
  if(dtTimer)clearInterval(dtTimer);
  cdTimer=setInterval(function(){
    elapsed++;
    var rem=Math.max(0,60-elapsed);
    logoAngle+=6;
    logo.style.transform='rotate('+logoAngle+'deg)';
    if(rem>0){num.textContent=rem;if(typeof speakCountdown==='function')speakCountdown(rem);}
    else{num.textContent='...';lbl.textContent='WAITING FOR NODE...';lbl.style.color='#f59e0b';}
  },1000);
  dtTimer=setInterval(function(){
    if(checkExplorerLoaded()&&(Date.now()-startTime)>=3000) doneLoading();
  },2000);
}

function doneLoading(){
  if(exLoaded)return;
  exLoaded=true;
  if(cdTimer)clearInterval(cdTimer);
  if(dtTimer)clearInterval(dtTimer);
  var num=document.getElementById('lov-num');
  var lbl=document.getElementById('lov-label');
  var ov=document.getElementById('lov-ex');
  num.textContent='✓';num.style.color='#00ff88';num.style.fontSize='42px';
  lbl.textContent='READY';lbl.style.color='#00ff88';lbl.style.animation='none';
  setTimeout(function(){ov.classList.add('gone');ov.style.display='none';},1200);
}

/* ===== TAB SWITCH ===== */
var cur='explorer';
var switching=false;

function go(t){
  if(t===cur||switching)return;
  switching=true;
  var fr=document.getElementById('fr');
  var ef=document.getElementById('ef');
  var wf=document.getElementById('wf');
  var safetyTimer=setTimeout(function(){switching=false;},3000);

  fr.classList.remove('visible');
  fr.classList.add('fading');
  if(typeof playRandomRetroSound==='function')try{playRandomRetroSound(0.5);}catch(e){}

  setTimeout(function(){
    ef.style.display='none';
    wf.style.display='none';

    if(t==='explorer'){
      ef.style.display='block';
      if(!exLoaded) initLoading();
    }else if(t==='wallet'){
      wf.style.display='block';
    }

    fr.classList.remove('fading');
    fr.classList.add('visible');

    setTimeout(function(){
      switching=false;
      clearTimeout(safetyTimer);
    },400);
  },400);

  cur=t;
  document.getElementById('be').className='nb'+(t==='explorer'?' on-ex':'');
  document.getElementById('bw').className='nb'+(t==='wallet'?' on-wl':'');
}

/* ===== WEB — opens in external browser ===== */
function openWeb(){
  if(typeof playRandomRetroSound==='function')try{playRandomRetroSound(0.5);}catch(e){}
  window.open('https://sostcore.com','_blank');
}

/* ===== EXIT ===== */
function xt(){
  if(typeof playRandomRetroSound==='function')try{playRandomRetroSound(0.5);}catch(e){}
  // Clear all iframes so they don't block exit or hold history
  var iframes=document.querySelectorAll('iframe');
  iframes.forEach(function(f){try{f.src='about:blank';}catch(e){}});
  // Try close (works in PWA standalone)
  setTimeout(function(){window.close();},100);
  // Force blank — replace() prevents back-button return
  setTimeout(function(){window.location.replace('/index.html');},500);
}

/* ===== INSTALL (PWA) ===== */
var dp=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  dp=e;
  var btn=document.getElementById('bdl');
  btn.className='nb';
  btn.style.color='#00ff88';
});
function dl(){
  if(dp){
    dp.prompt();
    dp.userChoice.then(function(r){
      dp=null;
      if(r.outcome==='accepted'){
        document.getElementById('bdl-text').textContent='INSTALLED';
        document.getElementById('bdl').className='nb on-dl dl-off';
      }
    });
  }else if(window.matchMedia('(display-mode:standalone)').matches){
    // Already installed — do nothing
  }else{
    // Can't install from here
  }
}
// Detect already installed
if(window.matchMedia('(display-mode:standalone)').matches){
  document.getElementById('bdl-text').textContent='INSTALLED';
  document.getElementById('bdl').className='nb on-dl dl-off';
}

/* ===== PWA ===== */
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});

/* ===== BATTERY OPTIMIZATION ===== */
// Stop CSS animations on splash after it's gone (saves GPU compositing)
// Stop any lingering speech synthesis when app goes to background
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
  }
});

/* ===== EXPLORER LOGO → OPENS WEB EXTERNALLY ===== */
document.getElementById('ef').addEventListener('load',function(){
  try{
    var doc=this.contentDocument;
    if(!doc)return;
    doc.addEventListener('click',function(e){
      var a=e.target.closest('a');
      if(!a)return;
      var href=a.getAttribute('href')||'';
      if(href==='index.html'||href==='/index.html'||href==='/'){
        e.preventDefault();
        openWeb();
      }else if(href.indexOf('http')===0&&href.indexOf('sost-explorer')===-1){
        e.preventDefault();
        window.open(href,'_blank');
      }
    },true);
  }catch(e){}
});
</script>
</body>
</html>
