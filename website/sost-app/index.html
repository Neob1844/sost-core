<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOST">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SOST Protocol</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Courier New','Lucida Console',monospace}

/* SPLASH — visible by default, covers everything */
#splash{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease}
#splash.out{opacity:0;pointer-events:none}
#splash::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.02) 2px,rgba(0,255,136,.02) 4px);pointer-events:none;animation:scanFlicker 4s linear infinite}
@keyframes scanFlicker{0%,100%{opacity:.5}50%{opacity:.8}}
#splash-logo{width:200px;height:200px;border-radius:20%;opacity:0;transform:scale(.4);animation:logoIn 2s ease forwards}
@keyframes logoIn{to{opacity:1;transform:scale(1)}}
#splash-title{margin-top:20px;font-size:18px;font-weight:700;color:#cc0000;letter-spacing:3px;text-align:center;opacity:0;animation:fadeIn .8s ease 2s forwards}
#splash-lines{margin-top:28px;font-size:12px;color:#00ff88;text-shadow:0 0 8px rgba(0,255,136,.4);min-height:80px;text-align:left;width:300px}
.tl{opacity:0;overflow:hidden;white-space:nowrap;border-right:2px solid #00ff88;width:0;line-height:2}
.tl.go{animation:typeW .6s steps(30) forwards,curBlink .5s step-end 4}
@keyframes typeW{from{opacity:1;width:0}to{opacity:1;width:100%}}
@keyframes curBlink{50%{border-color:transparent}}
#splash-scan{position:absolute;left:0;right:0;height:4px;background:linear-gradient(180deg,transparent,rgba(0,255,136,.15),transparent);opacity:0;animation:scanSweep 3s linear 3s infinite}
@keyframes scanSweep{0%{top:0;opacity:1}100%{top:100%;opacity:0}}
@keyframes fadeIn{to{opacity:1}}

/* APP — hidden with display:none until splash finishes */
#app{display:none;flex-direction:column;height:100%}
.frames{flex:1;position:relative;overflow:hidden}
.frames iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}

/* LOADING OVERLAY */
.lov{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
.lov.gone{opacity:0;pointer-events:none}
.pie{width:140px;height:140px;border-radius:50%;border:3px solid #333;position:relative;display:flex;align-items:center;justify-content:center;background:#222}
.pie-fill{position:absolute;inset:3px;border-radius:50%;transition:background .5s ease}
.pie-num{font-size:36px;color:#fff;font-weight:700;z-index:1;font-family:inherit}
.lov-label{margin-top:18px;font-size:14px;letter-spacing:2px;font-weight:600;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.lov-label.ok{animation:none;opacity:1}

/* NAV */
.bar{display:flex;height:58px;background:#0a0a0a;border-top:1px solid #222;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;z-index:100;position:relative}
.bar::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,.12) 1px,rgba(0,0,0,.12) 2px);pointer-events:none;opacity:.5}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#444;transition:all .15s;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;min-height:52px;user-select:none;border-left:1px solid #1a1a1a;position:relative}
.nb:first-child{border-left:none}
.nb .i{font-size:20px;margin-bottom:3px;transition:all .15s}
.nb:active{transform:scale(.94)}
.nb.ex-on{color:#00ff88}.nb.ex-on .i{text-shadow:0 0 10px rgba(0,255,136,.5)}
.nb.wl-on{color:#cc0000}.nb.wl-on .i{text-shadow:0 0 10px rgba(204,0,0,.5)}
.nb.dl{color:#00e5ff}.nb.dl.done{color:#00ff88}
.nb.wb{color:#00e5ff}
.nb.xt{color:#666}.nb.xt:active{color:#cc0000}

/* Tab fade transition */
.frames.fading{opacity:0;transition:opacity .4s ease}
.frames.visible{opacity:1;transition:opacity .4s ease}
</style>
</head>
<body>

<!-- SPLASH — on top of everything from the start -->
<div id="splash">
  <img id="splash-logo" src="/sost-logo.png" alt="SOST">
  <div id="splash-title">SOST PROTOCOL</div>
  <div id="splash-lines">
    <div class="tl" id="s1">&gt; Initializing node connection...</div>
    <div class="tl" id="s2">&gt; Verifying genesis block...</div>
    <div class="tl" id="s3">&gt; Syncing chain data...</div>
    <div class="tl" id="s4">&gt; Loading explorer modules...</div>
  </div>
  <div id="splash-scan"></div>
</div>

<!-- APP — display:none by default, NO iframes load until splash ends -->
<div id="app">
  <div class="frames visible" id="fr">
    <!-- iframes: src set by JS after splash, wallet starts hidden -->
    <iframe id="ef" style="display:block"></iframe>
    <iframe id="wf" style="display:none"></iframe>
    <div class="lov" id="lov-ex">
      <div class="pie"><div class="pie-fill" id="pf-ex"></div><span class="pie-num" id="pn-ex">60</span></div>
      <div class="lov-label" id="ll-ex" style="color:#00ff88">LOADING DATA...</div>
    </div>
    <div class="lov gone" id="lov-wl">
      <div class="pie"><div class="pie-fill" id="pf-wl"></div><span class="pie-num" id="pn-wl">60</span></div>
      <div class="lov-label" id="ll-wl" style="color:#cc0000">LOADING WALLET...</div>
    </div>
  </div>
  <nav class="bar">
    <div class="nb ex-on" id="be" onclick="go('explorer')"><span class="i">⛓</span>EXPLORER</div>
    <div class="nb dl" id="bd" onclick="dl()"><span class="i">📥</span>DOWNLOAD</div>
    <div class="nb wb" onclick="web()"><span class="i">🌐</span>WEB</div>
    <div class="nb xt" onclick="xt()"><span class="i">⏻</span>EXIT</div>
    <div class="nb" id="bw" onclick="go('wallet')"><span class="i">🔐</span>WALLET</div>
  </nav>
</div>

<script>
/* ===== SPLASH (7s) — app stays display:none until splash finishes ===== */
['s1','s2','s3','s4'].forEach(function(id,i){
  setTimeout(function(){var e=document.getElementById(id);if(e)e.classList.add('go');},2500+i*900);
});
setTimeout(function(){
  // Show app, THEN fade out splash
  var appEl=document.getElementById('app');
  appEl.style.display='flex';
  // Set iframe srcs NOW (not before) to prevent flash
  document.getElementById('ef').src='/sost-explorer.html';
  document.getElementById('wf').src='/sost-wallet.html';
  setTimeout(function(){
    document.getElementById('splash').classList.add('out');
    initLoading('ex');
    setTimeout(function(){document.getElementById('splash').style.display='none';},600);
  },100);
},7000);

/* ===== LOADING — IFRAME CONTENT DETECTION ===== */
var loaded={ex:false,wl:false};
var loadTs={ex:0,wl:0};
var countdownTimers={};
var detectIntervals={};

function checkExplorerLoaded(){
  try{
    var iframe=document.getElementById('ef');
    if(!iframe||!iframe.contentDocument||!iframe.contentDocument.body)return false;
    var text=iframe.contentDocument.body.innerText||'';
    // Look for real supply number like "5346.5369 SOST" (at least 2 digits before dot)
    var hasSupply=/\d{2,}\.\d+\s*SOST/.test(text);
    // Look for block height like #1234 (at least 2 digits)
    var hasHeight=/#\d{2,}/.test(text);
    return hasSupply&&hasHeight;
  }catch(e){return false;}
}

function checkWalletLoaded(){
  try{
    var iframe=document.getElementById('wf');
    if(!iframe||!iframe.contentDocument||!iframe.contentDocument.body)return false;
    var text=iframe.contentDocument.body.innerText||'';
    return text.indexOf('Dashboard')>=0||text.indexOf('BALANCE')>=0||text.indexOf('Launch Wallet')>=0||text.indexOf('Generate')>=0;
  }catch(e){return false;}
}

function initLoading(key){
  if(loaded[key]&&(Date.now()-loadTs[key])<300000){
    document.getElementById('lov-'+key).classList.add('gone');return;
  }
  var ov=document.getElementById('lov-'+key);
  var pf=document.getElementById('pf-'+key);
  var pn=document.getElementById('pn-'+key);
  var ll=document.getElementById('ll-'+key);
  ov.classList.remove('gone');
  var startTime=Date.now();
  var maxSec=60;var elapsed=0;

  if(countdownTimers[key])clearInterval(countdownTimers[key]);
  if(detectIntervals[key])clearInterval(detectIntervals[key]);

  // Countdown — visual only
  countdownTimers[key]=setInterval(function(){
    elapsed++;
    var rem=Math.max(0,maxSec-elapsed);
    var pct=Math.min(100,Math.round((elapsed/maxSec)*100));
    pf.style.background='conic-gradient(#cc0000 0% '+pct+'%, transparent '+pct+'% 100%)';
    pf.style.borderRadius='50%';
    if(rem>0){pn.textContent=rem;}
    else{pn.textContent='...';ll.textContent='CONNECTION SLOW...';ll.style.color='#f59e0b';}
  },1000);

  // Content detection — every 2s, check iframe content directly
  detectIntervals[key]=setInterval(function(){
    var minElapsed=(Date.now()-startTime)>=3000; // minimum 3s overlay
    var check=(key==='ex')?checkExplorerLoaded():checkWalletLoaded();
    if(check===true&&minElapsed){
      doneLoading(key);
    }
    // NO RPC fallback — only trust iframe content
  },2000);
}

function doneLoading(key){
  if(loaded[key])return;
  loaded[key]=true;loadTs[key]=Date.now();
  if(countdownTimers[key])clearInterval(countdownTimers[key]);
  if(detectIntervals[key])clearInterval(detectIntervals[key]);
  var pf=document.getElementById('pf-'+key);
  var pn=document.getElementById('pn-'+key);
  var ll=document.getElementById('ll-'+key);
  var ov=document.getElementById('lov-'+key);
  pf.style.background='conic-gradient(#00ff88 0% 100%, transparent 100% 100%)';
  pf.style.borderRadius='50%';
  pn.textContent='✓';pn.style.color='#00ff88';pn.style.fontSize='42px';
  ll.textContent='READY';ll.style.color='#00ff88';ll.classList.add('ok');
  setTimeout(function(){ov.classList.add('gone');},1000);
}

/* ===== TAB SWITCH — simple fade, no CRT (reliable > pretty) ===== */
var cur='explorer';
var switching=false;

function go(t){
  if(t===cur||switching)return;
  switching=true;
  var fr=document.getElementById('fr');
  var ef=document.getElementById('ef');
  var wf=document.getElementById('wf');

  // Safety: always reset switching after 3s max
  var safetyTimer=setTimeout(function(){switching=false;},3000);

  // Phase 1: fade out (0.4s)
  fr.classList.remove('visible');
  fr.classList.add('fading');

  setTimeout(function(){
    // Phase 2: swap iframes
    if(t==='explorer'){
      ef.style.display='block';
      wf.style.display='none';
    }else{
      wf.style.display='block';
      ef.style.display='none';
    }
    // Show overlay if first time
    if(!loaded[t==='explorer'?'ex':'wl']){
      var key=t==='explorer'?'ex':'wl';
      initLoading(key);
    }

    // Phase 3: fade in (0.4s)
    fr.classList.remove('fading');
    fr.classList.add('visible');

    setTimeout(function(){
      switching=false;
      clearTimeout(safetyTimer);
    },450);
  },450);

  // Update button states immediately
  cur=t;
  document.getElementById('be').className='nb'+(t==='explorer'?' ex-on':'');
  document.getElementById('bw').className='nb'+(t==='wallet'?' wl-on':'');
}

/* ===== WEB BUTTON ===== */
function web(){
  window.open('https://sostcore.com','_blank');
}

/* ===== PWA ===== */
var dp=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;});
function dl(){
  if(dp){dp.prompt();dp.userChoice.then(function(r){if(r.outcome==='accepted'){document.getElementById('bd').innerHTML='<span class="i">✓</span>INSTALLED';document.getElementById('bd').classList.add('done');}dp=null;});}
  else if(window.matchMedia('(display-mode:standalone)').matches){document.getElementById('bd').innerHTML='<span class="i">✓</span>INSTALLED';document.getElementById('bd').classList.add('done');}
  else{alert('To install: browser menu → "Add to Home Screen"');}
}
if(window.matchMedia('(display-mode:standalone)').matches){document.getElementById('bd').innerHTML='<span class="i">✓</span>INSTALLED';document.getElementById('bd').classList.add('done');}
function xt(){window.close();setTimeout(function(){alert('Close this tab to exit.');},100);}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
</script>
</body>
</html>
