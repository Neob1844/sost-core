<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOST">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<title>SOST Protocol</title>
<style>
/* ============================================================
   SOST PROTOCOL — Fallout Pip-Boy Terminal UI
   ============================================================ */

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --pip: #00ff41;
  --pip-dim: #00aa2a;
  --pip-dark: #003300;
  --pip-glow: rgba(0, 255, 65, 0.4);
  --pip-bg: #000000;
  --pip-panel: #0a0f0a;
  --pip-border: #00ff41;
  --pip-red: #ff0033;
  --pip-amber: #ffaa00;
  --font: 'VT323', 'Courier New', monospace;
  --scanline-opacity: 0.08;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--pip-bg);
  font-family: var(--font);
  color: var(--pip);
  font-size: 18px;
  line-height: 1.4;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* CRT Scanlines overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, var(--scanline-opacity)) 2px,
    rgba(0, 0, 0, var(--scanline-opacity)) 4px
  );
  pointer-events: none;
}

/* CRT phosphor glow */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
}

/* CRT Flicker animation */
@keyframes crtFlicker {
  0% { opacity: 1; }
  3% { opacity: 0.97; }
  6% { opacity: 1; }
  42% { opacity: 1; }
  44% { opacity: 0.98; }
  46% { opacity: 1; }
  87% { opacity: 1; }
  89% { opacity: 0.96; }
  91% { opacity: 1; }
  100% { opacity: 1; }
}

body {
  animation: crtFlicker 4s infinite;
}

/* ============================================================
   SPLASH SCREEN — Pixel Art Miner + Red Matrix Rain
   ============================================================ */
#splash {
  position: fixed; inset: 0; z-index: 10000;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.8s ease;
}
#splash.out {
  opacity: 0; pointer-events: none;
}
#splash-canvas {
  position: absolute; inset: 0; z-index: 0;
}
#splash-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* Pixel art miner */
#pixel-miner {
  width: 128px; height: 128px;
  position: relative;
  image-rendering: pixelated;
  margin-bottom: 20px;
}
#pixel-miner canvas {
  width: 128px; height: 128px;
  image-rendering: pixelated;
}

/* Rock layers under miner */
#rock-layers {
  width: 200px; height: 40px;
  position: relative;
  margin-bottom: 20px;
  overflow: hidden;
}
.rock-layer {
  position: absolute; left: 0; right: 0; height: 10px;
}
.rock-layer:nth-child(1) { top: 0; background: linear-gradient(90deg, #3a2a1a, #4a3a2a, #3a2a1a); }
.rock-layer:nth-child(2) { top: 10px; background: linear-gradient(90deg, #2a2a2a, #ffd700 10%, #2a2a2a 15%, #2a2a2a 80%, #ffd700 85%, #2a2a2a); }
.rock-layer:nth-child(3) { top: 20px; background: linear-gradient(90deg, #1a1a2a, #ff8c00 20%, #1a1a2a 30%, #1a1a2a 60%, #ff8c00 70%, #1a1a2a); }
.rock-layer:nth-child(4) { top: 30px; background: linear-gradient(90deg, #0a1a0a, #00ff41 40%, #0a1a0a 55%, #0a1a0a); }

/* Particles */
.spark {
  position: absolute;
  width: 3px; height: 3px;
  background: #ffaa00;
  opacity: 0;
}
@keyframes sparkFly {
  0% { opacity: 1; transform: translate(0,0); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)); }
}
@keyframes sparkle { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
@keyframes dropFall { 0%{transform:translateY(-5px);opacity:0} 20%{opacity:0.7} 80%{opacity:0.7} 100%{transform:translateY(25px);opacity:0} }
@keyframes batFly { 0%,100%{transform:translate(0,0)} 25%{transform:translate(10px,-5px)} 50%{transform:translate(20px,0)} 75%{transform:translate(10px,5px)} }

/* Lamp flicker */
@keyframes lampGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
  70% { opacity: 0.3; }
}
#lamp-glow {
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,220,0,0.8), transparent);
  top: -5px; left: 54px;
  animation: lampGlow 1.5s ease infinite;
  pointer-events: none;
}

#splash-title {
  font-family: var(--font);
  font-size: 48px;
  color: #ff0033;
  letter-spacing: 12px;
  text-shadow: 0 0 20px rgba(255,0,51,0.8), 0 0 60px rgba(255,0,51,0.4);
  opacity: 0;
  margin-bottom: 30px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  border-right: 3px solid #ff0033;
}
#splash-title.typing {
  animation: splashBlink 0.7s step-end infinite;
}
@keyframes splashBlink {
  0%, 100% { border-color: #ff0033; }
  50% { border-color: transparent; }
}
#splash-lines {
  font-family: var(--font);
  font-size: 16px;
  color: #aa0000;
  text-align: left;
  width: 420px;
  max-width: 90vw;
  min-height: 180px;
}
#splash-lines .sl {
  opacity: 0;
  margin: 4px 0;
  transition: opacity 0.3s;
}
#splash-lines .sl.show { opacity: 1; }
#splash-version {
  font-family: var(--font);
  font-size: 14px;
  color: #660000;
  margin-top: 20px;
  opacity: 0;
  transition: opacity 1s;
}

/* ============================================================
   APP LAYOUT
   ============================================================ */
#app {
  display: none;
  flex-direction: column;
  height: 100%;
  opacity: 0;
  transition: opacity 0.5s ease;
}
#app.visible {
  display: flex;
  opacity: 1;
}

/* Header */
#header {
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 12px;
  background: var(--pip-panel);
  border-bottom: 2px solid var(--pip-border);
  flex-shrink: 0;
  z-index: 200;
  position: relative;
  gap: 8px;
  box-shadow: 0 2px 20px var(--pip-glow);
}
#header .logo {
  font-family: var(--font);
  font-size: 22px;
  color: var(--pip);
  letter-spacing: 3px;
  text-shadow: 0 0 10px var(--pip-glow);
  cursor: pointer;
  white-space: nowrap;
}
.hdr-btn {
  font-family: var(--font);
  font-size: 16px;
  color: var(--pip);
  background: transparent;
  border: 1px solid var(--pip-dim);
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.hdr-btn:hover, .hdr-btn:active {
  background: var(--pip-dark);
  text-shadow: 0 0 8px var(--pip-glow);
  border-color: var(--pip);
}
.hdr-btn.back-btn { color: var(--pip-amber); border-color: #665500; }
.hdr-btn.back-btn:hover { border-color: var(--pip-amber); }
.hdr-btn.exit-btn { color: var(--pip-red); border-color: #660011; }
.hdr-btn.exit-btn:hover { border-color: var(--pip-red); }
.hdr-spacer { flex: 1; }
#hdr-blockh {
  font-size: 14px;
  color: var(--pip-dim);
  white-space: nowrap;
}
#hdr-clock {
  font-size: 14px;
  color: var(--pip-dim);
  white-space: nowrap;
  min-width: 80px;
  text-align: right;
}

/* Content area */
#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--pip-dim) var(--pip-bg);
}
#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-track { background: var(--pip-bg); }
#content::-webkit-scrollbar-thumb { background: var(--pip-dim); border-radius: 3px; }

/* Pip-Boy Panel */
.pip-panel {
  border: 1px solid var(--pip-border);
  background: var(--pip-panel);
  padding: 16px;
  margin-bottom: 16px;
  position: relative;
  box-shadow: 0 0 10px rgba(0,255,65,0.1), inset 0 0 30px rgba(0,255,65,0.02);
}
.pip-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--pip), transparent);
}
.pip-panel h2 {
  font-family: var(--font);
  font-size: 24px;
  color: var(--pip);
  text-shadow: 0 0 10px var(--pip-glow);
  margin-bottom: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--pip-dark);
  padding-bottom: 8px;
}
.pip-panel h3 {
  font-family: var(--font);
  font-size: 20px;
  color: var(--pip);
  margin: 12px 0 8px;
  letter-spacing: 2px;
}
.pip-panel p, .pip-panel li {
  font-family: var(--font);
  font-size: 17px;
  color: var(--pip-dim);
  line-height: 1.5;
}
.pip-panel a {
  color: var(--pip);
  text-decoration: none;
  border-bottom: 1px dashed var(--pip-dim);
}
.pip-panel a:hover {
  text-shadow: 0 0 8px var(--pip-glow);
}

/* Status indicators */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0,255,65,0.08);
}
.stat-label { color: var(--pip-dim); font-size: 16px; }
.stat-value { color: var(--pip); font-size: 16px; text-align: right; }
.stat-ok { color: #00ff41; }
.stat-warn { color: #ffaa00; }
.stat-err { color: #ff0033; }
.stat-badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 14px;
  border: 1px solid;
  letter-spacing: 1px;
}
.stat-badge.ok { color: #00ff41; border-color: #00ff41; }
.stat-badge.warn { color: #ffaa00; border-color: #ffaa00; }
.stat-badge.err { color: #ff0033; border-color: #ff0033; }

/* Iframe container */
.iframe-wrap {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.iframe-wrap iframe {
  width: 100%; height: 100%;
  border: none; background: #000;
}

/* ============================================================
   MENU OVERLAY
   ============================================================ */
#menu-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.92);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
#menu-overlay.open {
  display: flex;
}
#menu-overlay h2 {
  font-family: var(--font);
  font-size: 28px;
  color: var(--pip);
  letter-spacing: 6px;
  text-shadow: 0 0 20px var(--pip-glow);
  margin-bottom: 24px;
}
.menu-item {
  font-family: var(--font);
  font-size: 22px;
  color: var(--pip-dim);
  padding: 10px 40px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 2px;
  width: 360px;
  max-width: 90vw;
  text-align: left;
  border: 1px solid transparent;
  margin: 2px 0;
}
.menu-item:hover, .menu-item.active {
  color: var(--pip);
  background: var(--pip-dark);
  border-color: var(--pip-dim);
  text-shadow: 0 0 10px var(--pip-glow);
}
.menu-item .mi-num {
  color: var(--pip);
  margin-right: 12px;
  display: inline-block;
  width: 28px;
  text-align: right;
}
.menu-close {
  margin-top: 20px;
  font-family: var(--font);
  font-size: 18px;
  color: var(--pip-red);
  cursor: pointer;
  padding: 8px 30px;
  border: 1px solid #660011;
  transition: all 0.15s;
  letter-spacing: 2px;
}
.menu-close:hover {
  border-color: var(--pip-red);
  text-shadow: 0 0 10px rgba(255,0,51,0.5);
}

/* Session ended overlay */
#session-ended {
  position: fixed; inset: 0; z-index: 20000;
  background: #000;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
}
#session-ended.show { display: flex; }
#session-ended h1 {
  font-family: var(--font);
  font-size: 42px;
  color: var(--pip-red);
  letter-spacing: 8px;
  text-shadow: 0 0 30px rgba(255,0,51,0.6);
  animation: sessBlink 1.5s ease infinite;
}
@keyframes sessBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
#session-ended p {
  font-family: var(--font);
  font-size: 18px;
  color: #660000;
  margin-top: 16px;
  letter-spacing: 3px;
}

/* Loading shimmer */
@keyframes shimmer {
  0% { background-position: -200px 0; }
  100% { background-position: 200px 0; }
}
.loading-bar {
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--pip), transparent);
  background-size: 200px 100%;
  animation: shimmer 1.5s infinite;
  margin: 8px 0;
}

/* Responsive */
@media (max-width: 600px) {
  #splash-title { font-size: 32px; letter-spacing: 6px; }
  #splash-lines { font-size: 14px; width: 90vw; }
  #header .logo { font-size: 18px; letter-spacing: 2px; }
  .hdr-btn { font-size: 14px; padding: 3px 7px; }
  #hdr-blockh { font-size: 12px; }
  #hdr-clock { font-size: 12px; }
  #content { padding: 10px; }
  .pip-panel { padding: 12px; }
  .pip-panel h2 { font-size: 20px; }
  .menu-item { font-size: 18px; padding: 8px 20px; width: 280px; }
  #menu-overlay h2 { font-size: 22px; }
}
@media (max-width: 380px) {
  #header .logo { font-size: 15px; }
  .hdr-btn { font-size: 12px; padding: 2px 5px; }
  .pip-panel h2 { font-size: 18px; letter-spacing: 1px; }
}
</style>
</head>
<body>

<!-- ============================================================
     SPLASH SCREEN
     ============================================================ -->
<div id="splash">
  <canvas id="splash-canvas"></canvas>
  <div id="splash-content">
    <div id="pixel-miner">
      <canvas id="miner-canvas" width="32" height="32"></canvas>
      <div id="lamp-glow"></div>
    </div>
    <div id="rock-layers">
      <div class="rock-layer"></div>
      <div class="rock-layer"></div>
      <div class="rock-layer"></div>
      <div class="rock-layer"></div>
    </div>
    <div id="mine-env" style="width:200px;height:30px;position:relative;margin-bottom:10px">
      <div style="position:absolute;width:2px;height:2px;background:#ffd700;left:30px;top:5px;animation:sparkle 1.2s ease infinite;border-radius:50%"></div>
      <div style="position:absolute;width:2px;height:2px;background:#ffd700;left:120px;top:12px;animation:sparkle 1.8s ease infinite 0.4s;border-radius:50%"></div>
      <div style="position:absolute;width:2px;height:2px;background:#ffaa00;left:170px;top:3px;animation:sparkle 0.9s ease infinite 0.8s;border-radius:50%"></div>
      <div style="position:absolute;width:1px;height:4px;background:#4488aa;left:60px;top:0;animation:dropFall 2s linear infinite"></div>
      <div style="position:absolute;width:1px;height:4px;background:#4488aa;left:145px;top:0;animation:dropFall 2.5s linear infinite 1s"></div>
      <div style="position:absolute;width:4px;height:2px;background:#333;left:90px;top:8px;animation:batFly 3s ease-in-out infinite;border-radius:1px"></div>
      <div style="position:absolute;bottom:0;left:70px;width:60px;height:1px;background:#444"></div>
      <div style="position:absolute;bottom:2px;left:70px;width:60px;height:1px;background:#444"></div>
    </div>
    <div id="splash-title"></div>
    <div id="splash-lines"></div>
    <div id="splash-version">v5.0.0-MINER</div>
  </div>
</div>

<!-- ============================================================
     SESSION ENDED
     ============================================================ -->
<div id="session-ended">
  <h1>SESSION ENDED</h1>
  <p>TERMINAL DISCONNECTED</p>
</div>

<!-- ============================================================
     MENU OVERLAY
     ============================================================ -->
<div id="menu-overlay">
  <h2>MAIN MENU</h2>
  <div id="menu-items"></div>
  <div class="menu-close" id="menu-close-btn">[ESC] CLOSE</div>
</div>

<!-- ============================================================
     APP
     ============================================================ -->
<div id="app">
  <div id="header">
    <div class="logo" id="logo-btn">SOST://</div>
    <button class="hdr-btn back-btn" id="back-btn">&lt; BACK</button>
    <button class="hdr-btn" id="menu-btn">MENU</button>
    <div class="hdr-spacer"></div>
    <div id="hdr-blockh">BLK ---</div>
    <div id="hdr-clock">--:--:--</div>
    <button class="hdr-btn exit-btn" id="exit-btn">EXIT</button>
  </div>
  <div id="content"></div>
</div>

<script>
/* ==============================================================
   SOST PROTOCOL — Pip-Boy Terminal Application
   Complete self-contained JS: Audio, Navigation, Sections, RPC
   ============================================================== */

(function() {
'use strict';

// ── Configuration ──────────────────────────────────────────────
let RPC_URL = '/rpc';
let SOUND_ENABLED = true;
let THEME_COLOR = '#00ff41';

const SECTIONS = [
  { id: 'dashboard',  label: 'DASHBOARD',        icon: '[1]' },
  { id: 'wallet',     label: 'WALLET',            icon: '[2]' },
  { id: 'explorer',   label: 'EXPLORER',          icon: '[3]' },
  { id: 'security',   label: 'SECURITY',          icon: '[4]' },
  { id: 'geaspirit',  label: 'GEASPIRIT',         icon: '[5]' },
  { id: 'materials',  label: 'MATERIALS ENGINE',  icon: '[6]' },
  { id: 'documents',  label: 'DOCUMENTS',         icon: '[7]' },
  { id: 'markets',    label: 'MARKETS',           icon: '[8]' },
  { id: 'settings',   label: 'SETTINGS',          icon: '[9]' },
  { id: 'about',      label: 'ABOUT',             icon: '[0]' }
];

const SPLASH_LINES = [
  '> INITIALIZING KERNEL...',
  '> LOADING CONSENSUS ENGINE v4.0',
  '> CONVERGENCEX POW MODULE... OK',
  '> CASERT DIFFICULTY CONTROL... OK',
  '> UTXO SET INTEGRITY CHECK... PASS',
  '> SECP256K1 CRYPTO LIBRARY... LOADED',
  '> P2P NETWORK INTERFACE... STANDBY',
  '> MEMPOOL MANAGER... READY',
  '> GOLD VAULT ADDRESS... VERIFIED',
  '> POPC POOL ADDRESS... VERIFIED',
  '> CAPSULE PROTOCOL v1... ARMED',
  '> BLOCK VALIDATION LAYERS L1-L4... OK',
  '> TX RULES R1-R14, S1-S12, CB1-CB10',
  '> EMISSION SCHEDULE: 4.669M MAX SUPPLY',
  '> CONNECTING TO SOST NETWORK...',
  '> TERMINAL READY. WELCOME OPERATOR.'
];

// ── Web Audio Engine — 60 Retro Sounds ─────────────────────────
const AudioEngine = (function() {
  let ctx = null;

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function osc(type, freq, duration, vol, detune) {
    if (!SOUND_ENABLED) return;
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = type;
      o.frequency.value = freq;
      if (detune) o.detune.value = detune;
      g.gain.setValueAtTime(vol || 0.08, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + duration);
    } catch(e) {}
  }

  function noise(duration, vol) {
    if (!SOUND_ENABLED) return;
    try {
      const c = getCtx();
      const bufSize = c.sampleRate * duration;
      const buf = c.createBuffer(1, bufSize, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource();
      const g = c.createGain();
      src.buffer = buf;
      g.gain.setValueAtTime(vol || 0.03, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      src.connect(g); g.connect(c.destination);
      src.start();
    } catch(e) {}
  }

  function sweep(startF, endF, duration, type, vol) {
    if (!SOUND_ENABLED) return;
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = type || 'sine';
      o.frequency.setValueAtTime(startF, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(endF, c.currentTime + duration);
      g.gain.setValueAtTime(vol || 0.06, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + duration);
    } catch(e) {}
  }

  function multi(notes) {
    if (!SOUND_ENABLED) return;
    notes.forEach(n => {
      setTimeout(() => osc(n.type||'square', n.freq, n.dur||0.1, n.vol||0.06, n.det), (n.delay||0)*1000);
    });
  }

  // 50 Named Sound Effects
  return {

// ── Pixel Art Miner Drawing ────────────────────────────────────
function drawPixelMiner() {
  const mc = document.getElementById('miner-canvas');
  if (!mc) return;
  const ctx = mc.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // 32x32 pixel art miner (1=skin, 2=helmet, 3=body, 4=boots, 5=pick, 6=lamp)
  const PAL = {0:'transparent',1:'#d4a574',2:'#666666',3:'#4444aa',4:'#553311',5:'#888888',6:'#ffdd00'};
  const MINER = [
    '00000000022220000000000000000000',
    '00000000226222000000000000000000',
    '00000002222222200000000000000000',
    '00000002222622200000000000000000',
    '00000001111111000000000000000000',
    '00000001111111000000000000000000',
    '00000000111110000000000000000000',
    '00000003333330000000000000000000',
    '00000033333333000000000000000000',
    '00000033333333000000000000000000',
    '00000033133133000000000000000000',
    '00000033333333000000000000000000',
    '00000003333330000000000000000000',
    '00000000333300000000000000000000',
    '00000003333330000000000000000000',
    '00000033300333000000000000000000',
    '00000033300333000000000000000000',
    '00000044400444000000000000000000',
    '00000044400444000000000000000000',
  ];

  function draw(pickAngle) {
    ctx.clearRect(0,0,32,32);
    // Draw miner body
    for (let y = 0; y < MINER.length; y++) {
      for (let x = 0; x < MINER[y].length && x < 32; x++) {
        const c = PAL[MINER[y][x]];
        if (c && c !== 'transparent') {
          ctx.fillStyle = c;
          ctx.fillRect(x, y + 6, 1, 1);
        }
      }
    }
    // Draw pickaxe (rotating)
    ctx.save();
    ctx.translate(18, 14);
    ctx.rotate(pickAngle * Math.PI / 180);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, 0, 1, 8); // handle
    ctx.fillStyle = '#aaaaaa';
    ctx.fillRect(-2, -1, 5, 2); // head
    ctx.fillRect(-3, -1, 2, 1); // point
    ctx.restore();
  }

  // Animate pickaxe
  let angle = 0;
  let dir = 1;
  let sparkTimer = 0;
  const minerEl = document.getElementById('pixel-miner');

  function animate() {
    angle += dir * 4;
    if (angle > 45) dir = -1;
    if (angle < -10) {
      dir = 1;
      // Spark on hit
      if (minerEl) {
        for (let i = 0; i < 3; i++) {
          const sp = document.createElement('div');
          sp.className = 'spark';
          sp.style.left = '90px';
          sp.style.top = '80px';
          sp.style.setProperty('--sx', (Math.random()*30-15)+'px');
          sp.style.setProperty('--sy', (-Math.random()*20-5)+'px');
          sp.style.animation = 'sparkFly 0.4s ease-out forwards';
          sp.style.background = ['#ffaa00','#ff6600','#ffdd00'][i];
          minerEl.appendChild(sp);
          setTimeout(() => sp.remove(), 400);
        }
      }
      try { AudioEngine.click_hard(); } catch(e) {}
    }
    draw(angle);
    if (document.getElementById('splash') && !document.getElementById('splash').classList.contains('out')) {
      requestAnimationFrame(animate);
    }
  }

  draw(0);
  setTimeout(animate, 500);
}

// ── Red Matrix Rain Splash ─────────────────────────────────────
function runSplash(callback) {
  const canvas = document.getElementById('splash-canvas');
  const cctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const fontSize = 14;
  const cols = Math.floor(canvas.width / fontSize);
  const drops = new Array(cols).fill(1);
  const chars = 'SOST01アイウエオカキクケコサシスセソタチツテトナニヌネノ'.split('');

  let frame = 0;
  const totalFrames = 12 * 30; // 12 seconds at ~30fps

  function drawRain() {
    cctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    cctx.fillRect(0, 0, canvas.width, canvas.height);
    cctx.font = fontSize + 'px monospace';

    for (let i = 0; i < cols; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      const x = i * fontSize;
      const y = drops[i] * fontSize;

      // Red matrix palette
      const brightness = Math.random();
      if (brightness > 0.95) {
        cctx.fillStyle = '#ff4444';
        cctx.shadowBlur = 15;
        cctx.shadowColor = '#ff0000';
      } else if (brightness > 0.8) {
        cctx.fillStyle = '#cc0000';
        cctx.shadowBlur = 5;
        cctx.shadowColor = '#aa0000';
      } else {
        cctx.fillStyle = '#880000';
        cctx.shadowBlur = 0;
        cctx.shadowColor = 'transparent';
      }
      cctx.fillText(ch, x, y);
      cctx.shadowBlur = 0;

      if (y > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }

    frame++;
    if (frame < totalFrames) {
      requestAnimationFrame(drawRain);
    }
  }

  // Start rain + pixel miner
  drawRain();
  drawPixelMiner();
  AudioEngine.boot_start();

  // Type "SOST PROTOCOL" title after 1.5s
  const titleEl = document.getElementById('splash-title');
  const titleText = 'SOST PROTOCOL';
  let titleIdx = 0;
  setTimeout(() => {
    titleEl.style.opacity = '1';
    titleEl.classList.add('typing');
    const typeInterval = setInterval(() => {
      if (titleIdx < titleText.length) {
        titleEl.textContent = titleText.substring(0, titleIdx + 1);
        AudioEngine.type_key();
        titleIdx++;
      } else {
        clearInterval(typeInterval);
        titleEl.classList.remove('typing');
      }
    }, 80);
  }, 1500);

  // Terminal lines starting at 3s
  const linesEl = document.getElementById('splash-lines');
  SPLASH_LINES.forEach((text, i) => {
    const div = document.createElement('div');
    div.className = 'sl';
    div.textContent = text;
    linesEl.appendChild(div);

    setTimeout(() => {
      div.classList.add('show');
      AudioEngine.boot_progress();
    }, 3000 + i * 450);
  });

  // Show version
  setTimeout(() => {
    document.getElementById('splash-version').style.opacity = '1';
  }, 3000 + SPLASH_LINES.length * 450 + 200);

  // Boot complete sound
  setTimeout(() => {
    AudioEngine.boot_complete();
  }, 3000 + SPLASH_LINES.length * 450 + 500);

  // End splash after 12s
  setTimeout(() => {
    document.getElementById('splash').classList.add('out');
    setTimeout(callback, 800);
  }, 12000);
}


// ── Navigation System ──────────────────────────────────────────
const Nav = (function() {
  const stack = [];
  let current = null;

  function go(sectionId, pushToStack) {
    if (current === sectionId) return;
    if (pushToStack !== false && current) {
      stack.push(current);
    }
    current = sectionId;
    renderSection(sectionId);
    updateBackBtn();
    // Push browser history
    if (pushToStack !== false) {
      history.pushState({ section: sectionId }, '', '#' + sectionId);
    }
    AudioEngine.nav_select();
    // 20% chance of bonus retro sound
    if (Math.random() < 0.2) {
      const retros = ['retro_arpeggio','retro_coin','retro_powerup','retro_jump','retro_1up'];
      setTimeout(() => AudioEngine[retros[Math.floor(Math.random()*retros.length)]](), 200);
    }
  }

  function back() {
    if (stack.length > 0) {
      const prev = stack.pop();
      current = prev;
      renderSection(prev);
      updateBackBtn();
      AudioEngine.nav_back();
    }
  }

  function updateBackBtn() {
    const btn = document.getElementById('back-btn');
    btn.style.visibility = stack.length > 0 ? 'visible' : 'hidden';
  }

  function getCurrent() { return current; }
  function getStack() { return [...stack]; }

  return { go, back, getCurrent, getStack, updateBackBtn };
})();


// ── RPC Client ─────────────────────────────────────────────────
async function rpcCall(method, params) {
  try {
    const resp = await fetch(RPC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params: params || [] })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || 'RPC error');
    return data.result;
  } catch(e) {
    return null;
  }
}


// ── Clock ──────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const s = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('hdr-clock').textContent = h + ':' + m + ':' + s + 'Z';
}

// ── Block height poller ────────────────────────────────────────
let cachedInfo = null;
async function pollBlockHeight() {
  const info = await rpcCall('getinfo');
  if (info) {
    cachedInfo = info;
    const h = info.blocks !== undefined ? info.blocks : '---';
    document.getElementById('hdr-blockh').textContent = 'BLK ' + h;
    document.getElementById('hdr-blockh').classList.remove('stat-err');
  } else {
    document.getElementById('hdr-blockh').textContent = 'OFFLINE';
    document.getElementById('hdr-blockh').classList.add('stat-err');
  }
}

  function draw(canvas, name, size) {
    const icon = ICONS[name];
    if (!icon) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    canvas.width = 16; canvas.height = 16;
    canvas.style.width = (size || 32) + 'px';
    canvas.style.height = (size || 32) + 'px';
    canvas.style.imageRendering = 'pixelated';
    const d = icon.d;
    for (let i = 0; i < d.length && i < 256; i++) {
      const ci = parseInt(d[i]);
      if (ci > 0 && icon.p[ci]) {
        ctx.fillStyle = icon.p[ci];
        ctx.fillRect(i % 16, Math.floor(i / 16), 1, 1);
      }
    }
  }

  function random(canvas, size) {
    const names = Object.keys(ICONS);
    draw(canvas, names[Math.floor(Math.random() * names.length)], size);
  }

  function getNames() { return Object.keys(ICONS); }

  return { draw, random, getNames, count: Object.keys(ICONS).length };
})();


// ── Section Renderers ──────────────────────────────────────────
function renderSection(id) {
  const content = document.getElementById('content');
  // Clear iframes first to stop loading
  content.querySelectorAll('iframe').forEach(f => f.src = 'about:blank');
  content.innerHTML = '';
  content.style.padding = '';
  content.style.overflow = '';

  const renderer = SectionRenderers[id];
  if (renderer) renderer(content);

  // Add random pixel art decoration at bottom of section
  if (id !== 'wallet' && id !== 'explorer' && id !== 'markets') {
    const decor = document.createElement('div');
    decor.style.cssText = 'display:flex;justify-content:center;gap:8px;padding:16px 0;opacity:0.3;';
    for (let i = 0; i < 5; i++) {
      const c = document.createElement('canvas');
      PixelArt.random(c, 24);
      decor.appendChild(c);
    }
    content.appendChild(decor);
  }
}

        <span class="stat-label">THEME COLOR</span>

          <button class="theme-btn" data-color="#ffaa00" style="background:#ffaa00;width:28px;height:28px;border:2px solid #332200;cursor:pointer" title="Amber"></button>
          <button class="theme-btn" data-color="#ff6600" style="background:#ff6600;width:28px;height:28px;border:2px solid #331100;cursor:pointer" title="Orange"></button>

      </div>

      <div style="margin-top:20px">
        <button id="set-save-btn" style="

          font-family:var(--font);font-size:18px;padding:8px 24px;cursor:pointer;
          letter-spacing:2px;
        ">SAVE SETTINGS</button>
      </div>
    </div>

    <div class="pip-panel">
      <h2>// SYSTEM INFO</h2>
      <div class="stat-row"><span class="stat-label">APP VERSION</span><span class="stat-value">v4.0.0-PIPBOY</span></div>
      <div class="stat-row"><span class="stat-label">RENDERER</span><span class="stat-value">NATIVE HTML/JS</span></div>
      <div class="stat-row"><span class="stat-label">PWA</span><span class="stat-value stat-ok">ENABLED</span></div>
      <div class="stat-row"><span class="stat-label">AUDIO ENGINE</span><span class="stat-value">WEB AUDIO API (60 SFX)</span></div>
      <div class="stat-row"><span class="stat-label">CRT EMULATION</span><span class="stat-value stat-ok">ACTIVE</span></div>
    </div>

    <div class="pip-panel">
      <h2>// DIAGNOSTICS</h2>
      <button id="set-test-sound" style="
        background:transparent;border:1px solid var(--pip-dim);color:var(--pip);
        font-family:var(--font);font-size:16px;padding:6px 16px;cursor:pointer;margin:4px;
      ">TEST SOUNDS</button>
      <button id="set-test-rpc" style="
        background:transparent;border:1px solid var(--pip-dim);color:var(--pip);
        font-family:var(--font);font-size:16px;padding:6px 16px;cursor:pointer;margin:4px;
      ">TEST RPC</button>
      <div id="set-diag-out" style="margin-top:8px;font-size:14px;color:var(--pip-dim)"></div>
    </div>
  `;

  // Sound toggle
  document.getElementById('set-sound-btn').addEventListener('click', function() {
    SOUND_ENABLED = !SOUND_ENABLED;
    this.textContent = SOUND_ENABLED ? 'ON' : 'OFF';
    if (SOUND_ENABLED) AudioEngine.click_toggle();
  });

  // Theme color buttons
  el.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const color = this.dataset.color;
      applyThemeColor(color);
      AudioEngine.click_checkbox();
    });
  });

  // Save
  document.getElementById('set-save-btn').addEventListener('click', function() {
    const newRpc = document.getElementById('set-rpc').value.trim();
    if (newRpc) RPC_URL = newRpc;
    try {
      localStorage.setItem('sost_rpc', RPC_URL);
      localStorage.setItem('sost_sound', SOUND_ENABLED ? '1' : '0');
      localStorage.setItem('sost_theme', THEME_COLOR);
    } catch(e) {}
    AudioEngine.success_save();
    const out = document.getElementById('set-diag-out');
    if (out) out.textContent = '> SETTINGS SAVED TO LOCAL STORAGE';
  });

  // Test sounds
  document.getElementById('set-test-sound').addEventListener('click', function() {
    const out = document.getElementById('set-diag-out');
    if (out) out.textContent = '> PLAYING SOUND SEQUENCE...';
    const sounds = ['nav_click','nav_select','success_small','error_soft','type_key','ambient_beep','boot_progress','sys_notify'];
    sounds.forEach((s, i) => {
      setTimeout(() => AudioEngine[s](), i * 300);
    });
    setTimeout(() => { if (out) out.textContent = '> SOUND TEST COMPLETE (8/60 samples)'; }, sounds.length * 300);
  });

  // Test RPC
  document.getElementById('set-test-rpc').addEventListener('click', async function() {
    const out = document.getElementById('set-diag-out');
    if (out) out.textContent = '> TESTING RPC CONNECTION...';
    const info = await rpcCall('getinfo');
    if (info) {
      AudioEngine.success_connect();
      if (out) out.textContent = '> RPC OK — HEIGHT: ' + (info.blocks || '?');
    } else {
      AudioEngine.error_timeout();
      if (out) out.innerHTML = '> <span class="stat-err">RPC FAILED — ' + RPC_URL + '</span>';
    }
  });
};

// ── Theme color utility ────────────────────────────────────────
function applyThemeColor(color) {
  THEME_COLOR = color;
  const r = document.documentElement.style;
  r.setProperty('--pip', color);
  // Compute dim and dark variants
  const c = parseInt(color.slice(1), 16);
  const rd = (c >> 16) & 0xff, gd = (c >> 8) & 0xff, bd = c & 0xff;
  const dim = '#' + [Math.floor(rd*0.65), Math.floor(gd*0.65), Math.floor(bd*0.65)]
    .map(v => v.toString(16).padStart(2,'0')).join('');
  const dark = '#' + [Math.floor(rd*0.2), Math.floor(gd*0.2), Math.floor(bd*0.2)]
    .map(v => v.toString(16).padStart(2,'0')).join('');
  const glow = `rgba(${rd},${gd},${bd},0.4)`;
  r.setProperty('--pip-dim', dim);
  r.setProperty('--pip-dark', dark);
  r.setProperty('--pip-glow', glow);
  r.setProperty('--pip-border', color);
}


// ── Menu System ────────────────────────────────────────────────
function buildMenu() {
  const container = document.getElementById('menu-items');
  SECTIONS.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.innerHTML = `<span class="mi-num">${sec.icon}</span> ${sec.label}`;
    div.addEventListener('click', () => {
      closeMenu();
      AudioEngine.nav_select();
      Nav.go(sec.id);
    });
    container.appendChild(div);
  });
}

function openMenu() {
  document.getElementById('menu-overlay').classList.add('open');
  AudioEngine.nav_menu_open();
  // Highlight current
  const items = document.querySelectorAll('.menu-item');
  items.forEach((item, i) => {
    item.classList.toggle('active', SECTIONS[i].id === Nav.getCurrent());
  });
}

function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
  AudioEngine.nav_menu_close();
}


// ── Event Bindings ─────────────────────────────────────────────
function bindEvents() {
  // Header buttons
  document.getElementById('back-btn').addEventListener('click', () => Nav.back());
  document.getElementById('menu-btn').addEventListener('click', () => {
    const overlay = document.getElementById('menu-overlay');
    if (overlay.classList.contains('open')) closeMenu();
    else openMenu();
  });
  document.getElementById('logo-btn').addEventListener('click', () => {
    AudioEngine.nav_home();
    Nav.go('dashboard');
  });
  document.getElementById('exit-btn').addEventListener('click', () => {
    AudioEngine.sys_shutdown();
    // Kill all iframes
    document.querySelectorAll('iframe').forEach(f => { try { f.src = 'about:blank'; } catch(e) {} });
    document.getElementById('session-ended').classList.add('show');
    // After 4 seconds: try close, then redirect to blank
    setTimeout(() => {
      try { window.close(); } catch(e) {}
      setTimeout(() => { window.location.href = 'about:blank'; }, 500);
    }, 4000);
  });
  document.getElementById('menu-close-btn').addEventListener('click', closeMenu);

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    const overlay = document.getElementById('menu-overlay');
    const menuOpen = overlay.classList.contains('open');

    if (e.key === 'Escape') {
      if (menuOpen) { closeMenu(); e.preventDefault(); }
      else if (Nav.getStack().length > 0) { Nav.back(); e.preventDefault(); }
    }

    // Number keys for menu when open
    if (menuOpen && e.key >= '0' && e.key <= '9') {
      const idx = e.key === '0' ? 9 : parseInt(e.key) - 1;
      if (SECTIONS[idx]) {
        closeMenu();
        AudioEngine.nav_select();
        Nav.go(SECTIONS[idx].id);
        e.preventDefault();
      }
    }
  });

  // Browser back button
  window.addEventListener('popstate', (e) => {
    if (e.state && e.state.section) {
      Nav.go(e.state.section, false);
    } else {
      Nav.back();
    }
  });
}


// ── Load saved settings ────────────────────────────────────────
function loadSettings() {
  try {
    const savedRpc = localStorage.getItem('sost_rpc');
    if (savedRpc) RPC_URL = savedRpc;
    const savedSound = localStorage.getItem('sost_sound');
    if (savedSound !== null) SOUND_ENABLED = savedSound === '1';
    const savedTheme = localStorage.getItem('sost_theme');
    if (savedTheme) applyThemeColor(savedTheme);
  } catch(e) {}
}


// ── PWA Service Worker ─────────────────────────────────────────
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}


// ── Initialize ─────────────────────────────────────────────────
function init() {
  loadSettings();
  buildMenu();
  bindEvents();
  registerSW();

  // Unlock AudioContext on first interaction
  const unlockAudio = () => {
    AudioEngine.click_soft();
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('touchstart', unlockAudio);
  };
  document.addEventListener('click', unlockAudio);
  document.addEventListener('touchstart', unlockAudio);

  // Start splash
  runSplash(() => {
    const app = document.getElementById('app');
    app.classList.add('visible');
    Nav.go('dashboard');
    Nav.updateBackBtn();

    // Start periodic updates
    updateClock();
    setInterval(updateClock, 1000);
    pollBlockHeight();
    setInterval(pollBlockHeight, 30000);

    // Ambient hum every 45s
    setInterval(() => {
      if (SOUND_ENABLED && Math.random() > 0.5) AudioEngine.ambient_hum();
    }, 45000);
  });
}

// Boot
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
