<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://sostcore.com/sost-app/">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOST">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<title>SOST — Sovereign Stock Token</title>
<style>
/* ============================================================
   SOST — Sovereign Stock Token — Pip-Boy Terminal UI
   ============================================================ */

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --pip: #00ff41;
  --pip-dim: #00aa2a;
  --pip-dark: #003300;
  --pip-glow: rgba(0, 255, 65, 0.4);
  --pip-bg: #000000;
  --pip-panel: #0a0f0a;
  --pip-border: #00ff41;
  --pip-red: #fb010d;
  --pip-amber: #ffaa00;
  --font: 'VT323', 'Courier New', monospace;
  --scanline-opacity: 0.08;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--pip-bg);
  font-family: var(--font);
  color: var(--pip);
  font-size: 18px;
  line-height: 1.4;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* CRT Scanlines overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, var(--scanline-opacity)) 2px,
    rgba(0, 0, 0, var(--scanline-opacity)) 4px
  );
  pointer-events: none;
}

/* CRT phosphor glow */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
}

/* CRT Flicker animation */
@keyframes crtFlicker {
  0% { opacity: 1; }
  3% { opacity: 0.97; }
  6% { opacity: 1; }
  42% { opacity: 1; }
  44% { opacity: 0.98; }
  46% { opacity: 1; }
  87% { opacity: 1; }
  89% { opacity: 0.96; }
  91% { opacity: 1; }
  100% { opacity: 1; }
}

body {
  animation: crtFlicker 4s infinite;
}

/* ============================================================
   SPLASH SCREEN — Pixel Art Miner + Red Matrix Rain
   ============================================================ */
#splash {
  position: fixed; inset: 0; z-index: 10000;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.8s ease;
}
#splash.out {
  opacity: 0; pointer-events: none;
}
#splash-canvas {
  position: absolute; inset: 0; z-index: 0;
}
#splash-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: visible;
  max-height: 90vh;
}

/* Pixel art miner */
#pixel-miner {
  width: 192px; height: 192px;
  position: relative;
  image-rendering: pixelated;
  margin-bottom: 16px;
}
#pixel-miner canvas {
  width: 192px; height: 192px;
  image-rendering: pixelated;
}

/* Rock layers under miner */
#rock-layers {
  display: none; /* Removed: fixed bar below sprite — more space for title */
}
.rock-layer {
  position: absolute; left: 0; right: 0; height: 10px;
}
.rock-layer:nth-child(1) { top: 0; background: linear-gradient(90deg, #3a2a1a, #4a3a2a, #3a2a1a); }
.rock-layer:nth-child(2) { top: 10px; background: linear-gradient(90deg, #2a2a2a, #ffd700 10%, #2a2a2a 15%, #2a2a2a 80%, #ffd700 85%, #2a2a2a); }
.rock-layer:nth-child(3) { top: 20px; background: linear-gradient(90deg, #1a1a2a, #ff8c00 20%, #1a1a2a 30%, #1a1a2a 60%, #ff8c00 70%, #1a1a2a); }
.rock-layer:nth-child(4) { top: 30px; background: linear-gradient(90deg, #0a1a0a, #00ff41 40%, #0a1a0a 55%, #0a1a0a); }

/* Particles */
.spark {
  position: absolute;
  width: 3px; height: 3px;
  background: #ffaa00;
  opacity: 0;
}
@keyframes sparkFly {
  0% { opacity: 1; transform: translate(0,0); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)); }
}
@keyframes sparkle { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
@keyframes dropFall { 0%{transform:translateY(-5px);opacity:0} 20%{opacity:0.7} 80%{opacity:0.7} 100%{transform:translateY(25px);opacity:0} }
@keyframes batFly { 0%,100%{transform:translate(0,0)} 25%{transform:translate(10px,-5px)} 50%{transform:translate(20px,0)} 75%{transform:translate(10px,5px)} }

/* Lamp flicker */
@keyframes lampGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
  70% { opacity: 0.3; }
}
#lamp-glow {
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,220,0,0.8), transparent);
  top: -5px; left: 54px;
  animation: lampGlow 1.5s ease infinite;
  pointer-events: none;
}

#splash-title {
  font-family: var(--font);
  font-size: 48px;
  color: #ff0033;
  letter-spacing: 12px;
  text-shadow: 0 0 20px rgba(255,0,51,0.8), 0 0 60px rgba(255,0,51,0.4);
  opacity: 0;
  margin-bottom: 30px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  border-right: 3px solid #ff0033;
}
#splash-title.typing {
  animation: splashBlink 0.7s step-end infinite;
}
@keyframes splashBlink {
  0%, 100% { border-color: #ff0033; }
  50% { border-color: transparent; }
}
#splash-lines {
  font-family: var(--font);
  font-size: 16px;
  color: #aa0000;
  text-align: left;
  width: 420px;
  max-width: 90vw;
  min-height: 180px;
}
#splash-lines .sl {
  opacity: 0;
  margin: 4px 0;
  transition: opacity 0.3s;
}
#splash-lines .sl.show { opacity: 1; }
#splash-version {
  font-family: var(--font);
  font-size: 14px;
  color: #660000;
  margin-top: 20px;
  opacity: 0;
  transition: opacity 1s;
}

/* ============================================================
   APP LAYOUT
   ============================================================ */
#app {
  display: none;
  flex-direction: column;
  height: 100%;
  opacity: 0;
  transition: opacity 0.5s ease;
}
#app.visible {
  display: flex;
  opacity: 1;
}

/* Header */
#header {
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 12px;
  background: var(--pip-panel);
  border-bottom: 2px solid var(--pip-border);
  flex-shrink: 0;
  z-index: 200;
  position: relative;
  gap: 8px;
  box-shadow: 0 2px 20px var(--pip-glow);
}
#header .logo {
  font-family: var(--font);
  font-size: 22px;
  color: var(--pip);
  letter-spacing: 3px;
  text-shadow: 0 0 10px var(--pip-glow);
  cursor: pointer;
  white-space: nowrap;
}
.hdr-btn {
  font-family: var(--font);
  font-size: 16px;
  color: var(--pip);
  background: transparent;
  border: 1px solid var(--pip-dim);
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.hdr-btn:hover, .hdr-btn:active {
  background: var(--pip-dark);
  text-shadow: 0 0 8px var(--pip-glow);
  border-color: var(--pip);
}
.hdr-btn.back-btn { color: var(--pip-amber); border-color: #665500; }
.hdr-btn.back-btn:hover { border-color: var(--pip-amber); }
.hdr-btn.exit-btn { color: var(--pip-red); border-color: #660011; }
.hdr-btn.exit-btn:hover { border-color: var(--pip-red); }
.hdr-spacer { flex: 1; }
#hdr-blockh {
  font-size: 14px;
  color: var(--pip-dim);
  white-space: nowrap;
}
#hdr-clock {
  font-size: 14px;
  color: var(--pip-dim);
  white-space: nowrap;
  min-width: 80px;
  text-align: right;
}

/* Content area */
#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--pip-dim) var(--pip-bg);
}
#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-track { background: var(--pip-bg); }
#content::-webkit-scrollbar-thumb { background: var(--pip-dim); border-radius: 3px; }

/* Pip-Boy Panel */
.pip-panel {
  border: 1px solid var(--pip-border);
  background: var(--pip-panel);
  padding: 16px;
  margin-bottom: 16px;
  position: relative;
  box-shadow: 0 0 10px rgba(0,255,65,0.1), inset 0 0 30px rgba(0,255,65,0.02);
}
.pip-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--pip), transparent);
}
.pip-panel h2 {
  font-family: var(--font);
  font-size: 24px;
  color: var(--pip);
  text-shadow: 0 0 10px var(--pip-glow);
  margin-bottom: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--pip-dark);
  padding-bottom: 8px;
}
.pip-panel h3 {
  font-family: var(--font);
  font-size: 20px;
  color: var(--pip);
  margin: 12px 0 8px;
  letter-spacing: 2px;
}
.pip-panel p, .pip-panel li {
  font-family: var(--font);
  font-size: 17px;
  color: var(--pip-dim);
  line-height: 1.5;
}
.pip-panel a {
  color: var(--pip);
  text-decoration: none;
  border-bottom: 1px dashed var(--pip-dim);
}
.pip-panel a:hover {
  text-shadow: 0 0 8px var(--pip-glow);
}

/* Status indicators */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0,255,65,0.08);
}
.stat-label { color: var(--pip-dim); font-size: 16px; }
.stat-value { color: var(--pip); font-size: 16px; text-align: right; }
.stat-ok { color: #00ff41; }
.stat-warn { color: #ffaa00; }
.stat-err { color: #ff0033; }
.stat-badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 14px;
  border: 1px solid;
  letter-spacing: 1px;
}
.stat-badge.ok { color: #00ff41; border-color: #00ff41; }
.stat-badge.warn { color: #ffaa00; border-color: #ffaa00; }
.stat-badge.err { color: #ff0033; border-color: #ff0033; }

/* Iframe container */
.iframe-wrap {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.iframe-wrap iframe {
  width: 100%; height: 100%;
  border: none; background: #000;
}

/* ============================================================
   MENU OVERLAY
   ============================================================ */
#menu-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.92);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
#menu-overlay.open {
  display: flex;
}
#menu-overlay h2 {
  font-family: var(--font);
  font-size: 28px;
  color: var(--pip);
  letter-spacing: 6px;
  text-shadow: 0 0 20px var(--pip-glow);
  margin-bottom: 24px;
}
.menu-item {
  font-family: var(--font);
  font-size: 22px;
  color: var(--pip-dim);
  padding: 10px 40px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 2px;
  width: 360px;
  max-width: 90vw;
  text-align: left;
  border: 1px solid transparent;
  margin: 2px 0;
}
.menu-item:hover, .menu-item.active {
  color: var(--pip);
  background: var(--pip-dark);
  border-color: var(--pip-dim);
  text-shadow: 0 0 10px var(--pip-glow);
}
.menu-item .mi-num {
  color: var(--pip);
  margin-right: 12px;
  display: inline-block;
  width: 28px;
  text-align: right;
}
.menu-close {
  margin-top: 20px;
  font-family: var(--font);
  font-size: 18px;
  color: var(--pip-red);
  cursor: pointer;
  padding: 8px 30px;
  border: 1px solid #660011;
  transition: all 0.15s;
  letter-spacing: 2px;
}
.menu-close:hover {
  border-color: var(--pip-red);
  text-shadow: 0 0 10px rgba(255,0,51,0.5);
}

/* Session ended overlay */
#session-ended {
  position: fixed; inset: 0; z-index: 20000;
  background: #000;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
}
#session-ended.show { display: flex; }
#session-ended h1 {
  font-family: var(--font);
  font-size: 42px;
  color: var(--pip-red);
  letter-spacing: 8px;
  text-shadow: 0 0 30px rgba(255,0,51,0.6);
  animation: sessBlink 1.5s ease infinite;
}
@keyframes sessBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
#session-ended p {
  font-family: var(--font);
  font-size: 18px;
  color: #660000;
  margin-top: 16px;
  letter-spacing: 3px;
}

/* Loading shimmer */
@keyframes shimmer {
  0% { background-position: -200px 0; }
  100% { background-position: 200px 0; }
}
.loading-bar {
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--pip), transparent);
  background-size: 200px 100%;
  animation: shimmer 1.5s infinite;
  margin: 8px 0;
}

@keyframes explorerBlink {
  0%, 100% { opacity: 1; color: var(--pip); border-color: var(--pip); }
  50% { opacity: 0.4; color: var(--pip-dim); border-color: var(--pip-dark); }
}

/* Responsive */
@media (max-width: 600px) {
  #splash-title { font-size: 32px; letter-spacing: 6px; }
  #splash-lines { font-size: 14px; width: 90vw; }
  #pixel-miner { width: 120px; height: 120px; margin-bottom: 8px; }
  #pixel-miner canvas { width: 120px; height: 120px; }
  #rock-layers { width: 160px; height: 30px; }
  #header { padding: 0 6px; gap: 4px; height: 46px; flex-wrap: nowrap; overflow-x: auto; }
  #header .logo { font-size: 16px; letter-spacing: 1px; white-space: nowrap; }
  #hdr-logo-canvas { display: none; }
  .hdr-btn { font-size: 12px; padding: 2px 6px; white-space: nowrap; }
  #hdr-blockh { font-size: 11px; white-space: nowrap; }
  #hdr-clock { font-size: 11px; white-space: nowrap; }
  #web-btn { display: none; }
  #exit-btn { display: none; }
  #content { padding: 10px; }
  .pip-panel { padding: 12px; }
  .pip-panel h2 { font-size: 20px; }
  .menu-item { font-size: 18px; padding: 8px 20px; width: 280px; }
  #menu-overlay h2 { font-size: 22px; }
}
@media (max-width: 380px) {
  #header .logo { font-size: 14px; }
  .hdr-btn { font-size: 11px; padding: 2px 4px; }
  .pip-panel h2 { font-size: 18px; letter-spacing: 1px; }
  #hdr-clock { display: none; }
}

/* Block/TX detail overlay */
#block-detail-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.92); z-index:9999; overflow:auto; padding:20px;
}
#block-detail-overlay.show { display:block; }
#block-detail-overlay .bdo-content {
  max-width:600px; margin:40px auto; border:2px solid var(--pip);
  background:var(--pip-panel); padding:16px; font-family:var(--font-mono,'Fira Code',monospace);
  font-size:13px; color:var(--pip); border-radius:4px;
}
#block-detail-overlay .bdo-close {
  float:right; cursor:pointer; color:var(--pip); font-size:18px; padding:4px 8px;
  border:1px solid var(--pip-dark); background:none;
}
#block-detail-overlay .bdo-close:hover { background:var(--pip-dark); }
#block-detail-overlay .bdo-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--pip-dark); }
#block-detail-overlay .bdo-key { color:var(--pip-dim); font-size:12px; }
#block-detail-overlay .bdo-val { color:var(--pip); font-size:12px; word-break:break-all; text-align:right; max-width:60%; }
.tip-trigger { position:relative; cursor:pointer; }
.tip-trigger::after { content:'ⓘ'; font-size:10px; color:var(--pip-dim); margin-left:6px; opacity:0.5; }
.tip-box { display:none; margin-top:6px; padding:8px 10px; background:rgba(0,0,0,0.85); border:1px solid var(--pip-dark); border-radius:4px; font-size:12px; color:var(--pip-dim); line-height:1.6; }
.tip-box.show { display:block; }
</style>
</head>
<body>

<!-- ============================================================
     SPLASH SCREEN
     ============================================================ -->
<div id="splash">
  <canvas id="splash-canvas"></canvas>
  <div id="splash-content">
    <div id="pixel-miner">
      <canvas id="miner-canvas" width="32" height="32"></canvas>
      <div id="lamp-glow"></div>
    </div>
    <div id="rock-layers">
      <div class="rock-layer"></div>
      <div class="rock-layer"></div>
      <div class="rock-layer"></div>
      <div class="rock-layer"></div>
    </div>
    <div id="mine-env" style="width:200px;height:30px;position:relative;margin-bottom:10px">
      <div style="position:absolute;width:2px;height:2px;background:#ffd700;left:30px;top:5px;animation:sparkle 1.2s ease infinite;border-radius:50%"></div>
      <div style="position:absolute;width:2px;height:2px;background:#ffd700;left:120px;top:12px;animation:sparkle 1.8s ease infinite 0.4s;border-radius:50%"></div>
      <div style="position:absolute;width:2px;height:2px;background:#ffaa00;left:170px;top:3px;animation:sparkle 0.9s ease infinite 0.8s;border-radius:50%"></div>
      <div style="position:absolute;width:1px;height:4px;background:#4488aa;left:60px;top:0;animation:dropFall 2s linear infinite"></div>
      <div style="position:absolute;width:1px;height:4px;background:#4488aa;left:145px;top:0;animation:dropFall 2.5s linear infinite 1s"></div>
      <div style="position:absolute;width:4px;height:2px;background:#333;left:90px;top:8px;animation:batFly 3s ease-in-out infinite;border-radius:1px"></div>
      <div style="position:absolute;bottom:0;left:70px;width:60px;height:1px;background:#444"></div>
      <div style="position:absolute;bottom:2px;left:70px;width:60px;height:1px;background:#444"></div>
    </div>
    <div id="splash-sprite-name" style="font-size:10px;letter-spacing:3px;color:#ff003380;margin-top:4px;text-transform:uppercase"></div>
    <div id="splash-title"></div>
    <div id="splash-lines"></div>
    <div id="splash-version">v5.0.0-MINER</div>
  </div>
</div>

<!-- ============================================================
     SESSION ENDED
     ============================================================ -->
<div id="session-ended">
  <h1>SESSION ENDED</h1>
  <p>TERMINAL DISCONNECTED</p>
</div>

<!-- ============================================================
     MENU OVERLAY
     ============================================================ -->
<div id="menu-overlay">
  <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px">
    <canvas id="menu-logo-canvas"></canvas>
    <h2 style="margin:0">MAIN MENU</h2>
  </div>
  <div id="menu-items"></div>
  <div class="menu-close" id="menu-close-btn">‹ BACK</div>
</div>

<!-- ============================================================
     APP
     ============================================================ -->
<div id="app">
  <div id="header">
    <div class="logo" id="logo-btn" style="display:flex;align-items:center;gap:6px;cursor:pointer" title="Open SOST website"><canvas id="hdr-logo-canvas"></canvas>SOST://</div>
    <button class="hdr-btn back-btn" id="back-btn">&lt; BACK</button>
    <button class="hdr-btn" id="menu-btn">MENU</button>
    <button class="hdr-btn" id="web-btn" style="color:#0af" onclick="window.open('https://sostcore.com?from=app','_blank')">WEB</button>
    <div class="hdr-spacer"></div>
    <div id="hdr-blockh">BLK ---</div>
    <div id="hdr-clock">--:--:--</div>
    <span style="display:flex;gap:2px;margin-left:4px">
      <button class="hdr-btn" style="font-size:14px;padding:0 6px;min-width:24px" onclick="document.getElementById('content').style.transform='scale('+(parseFloat(document.getElementById('content').dataset.zoom||1)+0.1)+')';document.getElementById('content').dataset.zoom=parseFloat(document.getElementById('content').dataset.zoom||1)+0.1;document.getElementById('content').style.transformOrigin='top left'" title="Zoom in">+</button>
      <button class="hdr-btn" style="font-size:14px;padding:0 6px;min-width:24px" onclick="var z=Math.max(0.5,parseFloat(document.getElementById('content').dataset.zoom||1)-0.1);document.getElementById('content').style.transform='scale('+z+')';document.getElementById('content').dataset.zoom=z;document.getElementById('content').style.transformOrigin='top left'" title="Zoom out">−</button>
    </span>
    <button class="hdr-btn" id="explorer-btn" style="animation:explorerBlink 2s ease-in-out infinite" onclick="window.open('https://sostcore.com/sost-explorer.html?from=app','_blank')">EXPL</button>
    <button class="hdr-btn exit-btn" id="exit-btn">EXIT</button>
  </div>
  <div id="content"></div>
</div>

<script>
/* ==============================================================
   SOST — Sovereign Stock Token — Pip-Boy Terminal Application
   Complete self-contained JS: Audio, Navigation, Sections, RPC
   ============================================================== */

(function() {
'use strict';

// No domain redirect — both sostcore.com and sostprotocol.com serve identical content

// ── Configuration ──────────────────────────────────────────────
let RPC_URL = '/rpc'; // Always relative — we redirect non-sostcore domains above
let SOUND_ENABLED = true;
let THEME_COLOR = '#00ff41';

// ── Web Audio Engine — 60 Retro Sounds ─────────────────────────
const AudioEngine = (function() {
  let ctx = null;

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function osc(type, freq, duration, vol, detune) {
    if (!SOUND_ENABLED) return;
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = type;
      o.frequency.value = freq;
      if (detune) o.detune.value = detune;
      g.gain.setValueAtTime(vol || 0.08, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + duration);
    } catch(e) {}
  }

  function noise(duration, vol) {
    if (!SOUND_ENABLED) return;
    try {
      const c = getCtx();
      const bufSize = c.sampleRate * duration;
      const buf = c.createBuffer(1, bufSize, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource();
      const g = c.createGain();
      src.buffer = buf;
      g.gain.setValueAtTime(vol || 0.03, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      src.connect(g); g.connect(c.destination);
      src.start();
    } catch(e) {}
  }

  function sweep(startF, endF, duration, type, vol) {
    if (!SOUND_ENABLED) return;
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = type || 'sine';
      o.frequency.setValueAtTime(startF, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(endF, c.currentTime + duration);
      g.gain.setValueAtTime(vol || 0.06, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + duration);
    } catch(e) {}
  }

  function multi(notes) {
    if (!SOUND_ENABLED) return;
    notes.forEach(n => {
      setTimeout(() => osc(n.type||'square', n.freq, n.dur||0.1, n.vol||0.06, n.det), (n.delay||0)*1000);
    });
  }

  // 50 Named Sound Effects
  return {
    // Navigation sounds (1-8)
    nav_click: function() { osc('square', 800, 0.06, 0.07); },
    nav_select: function() { multi([{freq:600,dur:0.05},{freq:900,dur:0.08,delay:0.04}]); },
    nav_back: function() { multi([{freq:900,dur:0.05},{freq:600,dur:0.08,delay:0.04}]); },
    nav_menu_open: function() { sweep(200, 1200, 0.15, 'sawtooth', 0.05); },
    nav_menu_close: function() { sweep(1200, 200, 0.15, 'sawtooth', 0.05); },
    nav_tab: function() { osc('square', 1000, 0.04, 0.05); },
    nav_scroll: function() { osc('sine', 400, 0.03, 0.03); },
    nav_home: function() { multi([{freq:523,dur:0.06},{freq:659,dur:0.06,delay:0.06},{freq:784,dur:0.1,delay:0.12}]); },

    // Click/interaction sounds (9-16)
    click_soft: function() { osc('sine', 600, 0.04, 0.04); },
    click_hard: function() { osc('square', 1200, 0.03, 0.08); },
    click_toggle: function() { osc('triangle', 700, 0.06, 0.06); },
    click_checkbox: function() { multi([{freq:800,dur:0.03},{freq:1200,dur:0.05,delay:0.03}]); },
    click_button: function() { osc('square', 500, 0.05, 0.06); noise(0.03, 0.02); },
    click_link: function() { osc('sine', 900, 0.05, 0.05); },
    click_expand: function() { sweep(400, 800, 0.1, 'triangle', 0.05); },
    click_collapse: function() { sweep(800, 400, 0.1, 'triangle', 0.05); },

    // Success sounds (17-22)
    success_small: function() { multi([{freq:523,dur:0.08},{freq:784,dur:0.12,delay:0.08}]); },
    success_big: function() { multi([{freq:523,dur:0.08},{freq:659,dur:0.08,delay:0.08},{freq:784,dur:0.15,delay:0.16}]); },
    success_confirm: function() { multi([{freq:400,dur:0.06},{freq:600,dur:0.06,delay:0.06},{freq:800,dur:0.1,delay:0.12}]); },
    success_save: function() { osc('sine', 880, 0.15, 0.06); },

function drawSplashSprite() {
  const mc = document.getElementById('miner-canvas');
  if (!mc) return;
  const ctx = mc.getContext('2d');
  mc.width = 16; mc.height = 16;

  const sprite = SplashSprites.pick();
  const nameEl = document.getElementById('splash-sprite-name');
  if (nameEl) nameEl.textContent = sprite.name.replace(/_/g, ' ').toUpperCase();

  let frame = 0;
  let animDir = 1;

  function animate() {
    ctx.clearRect(0, 0, 16, 16);
    SplashSprites.drawSprite(ctx, sprite, frame);

    // Simple animation overlay per sprite type
    ctx.save();
    const anim = sprite.anim;
    if (anim === 'pickaxe') {
      ctx.translate(12, 8);
      ctx.rotate((Math.sin(frame * 0.15) * 40) * Math.PI / 180);
      ctx.fillStyle = '#8B4513'; ctx.fillRect(0, 0, 1, 5);
      ctx.fillStyle = '#aaa'; ctx.fillRect(-1, -1, 3, 1);
    } else if (anim === 'pong') {
      // Ball bouncing
      const bx = 7 + Math.sin(frame * 0.1) * 5;
      const by = 7 + Math.cos(frame * 0.13) * 5;
      ctx.fillStyle = '#fff'; ctx.fillRect(Math.floor(bx), Math.floor(by), 1, 1);
    } else if (anim === 'chomp') {
      // Pac-man mouth opening/closing
      if (frame % 20 < 10) {
        ctx.fillStyle = '#000'; ctx.fillRect(8, 6, 4, 1); ctx.fillRect(8, 8, 4, 1);
      }
    } else if (anim === 'shine' || anim === 'sparkle' || anim === 'glow') {
      // Sparkle effect
      if (frame % 15 < 3) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(5 + (frame % 7), 5 + (frame % 5), 1, 1);
        ctx.fillRect(10 - (frame % 4), 3 + (frame % 6), 1, 1);
      }
    } else if (anim === 'flip' || anim === 'rotate') {
      // Slight scale pulse
      if (frame % 30 < 5) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(0, 0, 16, 16);
      }
    } else if (anim === 'roll') {
      // Cart wheels spinning (dots)
      const a = frame * 0.2;
      ctx.fillStyle = '#fff';
      ctx.fillRect(4 + Math.cos(a), 14, 1, 1);
      ctx.fillRect(11 + Math.cos(a + 3.14), 14, 1, 1);
    } else if (anim === 'slither') {
      // Snake head movement
      const sx = Math.sin(frame * 0.15) * 1;
      ctx.fillStyle = '#0f0'; ctx.fillRect(1 + sx, 12, 2, 1);
    } else if (anim === 'drive') {
      // Road lines moving
      const roadY = 12;
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 3; i++) {
        const lx = ((frame * 0.5 + i * 6) % 16);
        ctx.fillRect(lx, roadY, 2, 1);
      }
    } else if (anim === 'thrust') {
      // Rocket flame
      if (frame % 4 < 2) {
        ctx.fillStyle = '#ff6600'; ctx.fillRect(7, 13, 2, 2);
        ctx.fillStyle = '#ff0'; ctx.fillRect(7, 14, 2, 1);
      } else {
        ctx.fillStyle = '#f00'; ctx.fillRect(7, 13, 2, 1);
      }
    } else if (anim === 'pulse') {
      // LED blinking on chip
      ctx.fillStyle = (frame % 20 < 10) ? '#0f0' : '#030';
      ctx.fillRect(7, 7, 2, 2);
    } else if (anim === 'build') {
      // Block appearing
      if (frame % 40 < 20) {
        ctx.fillStyle = '#0af'; ctx.fillRect(1, 12, 6, 3);
      }
    } else if (anim === 'invader') {
      // Legs wiggling
      const wiggle = (frame % 20 < 10) ? 0 : 1;
      ctx.fillStyle = '#0f0';
      ctx.fillRect(3 + wiggle, 9, 1, 1); ctx.fillRect(12 - wiggle, 9, 1, 1);
    } else if (anim === 'fall') {
      // Tetris piece falling
      const fy = (frame * 0.3) % 14;
      ctx.fillStyle = '#00bcd4'; ctx.fillRect(10, fy, 2, 2);
    } else if (anim === 'open') {
      // Chest lid opening
      if (frame % 40 < 20) {
        ctx.fillStyle = '#ffd700'; ctx.fillRect(5, 2, 4, 2);
      }
    } else if (anim === 'strike') {
      // Hammer hitting anvil
      if (frame % 30 < 5) {
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(6, 1, 3, 2);
        ctx.fillRect(7, 0, 1, 1);
      }
    } else if (anim === 'prisma') {
      // Color shifting
      const hue = (frame * 3) % 360;
      ctx.fillStyle = `hsl(${hue},100%,70%)`;
      ctx.fillRect(7, 7, 2, 2);
    }
    ctx.restore();

    frame++;
    if (document.getElementById('splash') && !document.getElementById('splash').classList.contains('out')) {
      requestAnimationFrame(animate);
    }
  }

  SplashSprites.drawSprite(ctx, sprite, 0);
  setTimeout(animate, 500);
}

// ── Red Matrix Rain Splash ─────────────────────────────────────
function runSplash(callback) {
  const canvas = document.getElementById('splash-canvas');
  const cctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const fontSize = 14;
  const cols = Math.floor(canvas.width / fontSize);
  const drops = new Array(cols).fill(1);
  const chars = 'SOST01アイウエオカキクケコサシスセソタチツテトナニヌネノ'.split('');

  let frame = 0;
  const totalFrames = 12 * 30; // 12 seconds at ~30fps

  function drawRain() {
    cctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    cctx.fillRect(0, 0, canvas.width, canvas.height);
    cctx.font = fontSize + 'px monospace';

    for (let i = 0; i < cols; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      const x = i * fontSize;
      const y = drops[i] * fontSize;

      // Red matrix palette
      const brightness = Math.random();
      if (brightness > 0.95) {
        cctx.fillStyle = '#fb010d';
        cctx.shadowBlur = 15;
        cctx.shadowColor = '#ff0000';
      } else if (brightness > 0.8) {
        cctx.fillStyle = '#cc0000';
        cctx.shadowBlur = 5;
        cctx.shadowColor = '#aa0000';
      } else {
        cctx.fillStyle = '#880000';
        cctx.shadowBlur = 0;
        cctx.shadowColor = 'transparent';
      }
      cctx.fillText(ch, x, y);
      cctx.shadowBlur = 0;

      if (y > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }

    frame++;
    if (frame < totalFrames) {
      requestAnimationFrame(drawRain);
    }
  }

  // Start rain + pixel miner + random icons
  drawRain();
  drawSplashSprite();
  AudioEngine.boot_start();
  // Play a random retro sound for variety
  const splashSounds = ['retro_arpeggio','retro_coin','retro_powerup','retro_jump','retro_1up','retro_warp','retro_laser'];
  setTimeout(() => { try { AudioEngine[splashSounds[Math.floor(Math.random()*splashSounds.length)]](); } catch(e){} }, 2000);

  // Show random pixel art icons during splash (appear at 4s, 6s, 8s)
  const splashContent = document.getElementById('splash-content');
  if (splashContent) {
    const iconRow = document.createElement('div');
    iconRow.style.cssText = 'display:flex;gap:12px;justify-content:center;align-items:center;margin-top:8px;opacity:0;transition:opacity 1s;';
    // Center: SOST Sigma logo (larger)
    const isMobile = window.innerWidth < 600;
    const logoSize = isMobile ? 48 : 80;
    const iconSize = isMobile ? 28 : 48;
    const splashLogo = document.createElement('canvas');
    drawSOSTLogo(splashLogo, logoSize, '#ff0033');
    iconRow.appendChild(splashLogo);
    // Flanking random icons
    for (let i = 0; i < 4; i++) {
      const c = document.createElement('canvas');
      PixelArt.random(c, iconSize);
      if (i < 2) iconRow.insertBefore(c, splashLogo);
      else iconRow.appendChild(c);
    }
    splashContent.insertBefore(iconRow, document.getElementById('splash-title'));
    setTimeout(() => { iconRow.style.opacity = '0.7'; }, 4000);
    console.log('[Splash] Pixel art icons loaded:', PixelArt.count, 'total in library');
  }

  // Type "SOST" title after 1.5s
  const titleEl = document.getElementById('splash-title');
  const titleText = 'SOST APP';
  let titleIdx = 0;
  setTimeout(() => {
    titleEl.style.opacity = '1';
    titleEl.classList.add('typing');
    const typeInterval = setInterval(() => {
      if (titleIdx < titleText.length) {
        titleEl.textContent = titleText.substring(0, titleIdx + 1);
        AudioEngine.type_key();
        titleIdx++;
      } else {
        clearInterval(typeInterval);
        titleEl.classList.remove('typing');
        // Add subtitle after typing finishes
        const sub = document.createElement('div');
        sub.style.cssText = 'font-size:22px;letter-spacing:6px;color:rgba(255,0,51,0.7);margin-top:10px;opacity:0;transition:opacity 1s;font-weight:600';
        sub.textContent = 'SOVEREIGN STOCK TOKEN';
        titleEl.parentElement.insertBefore(sub, titleEl.nextSibling);
        setTimeout(() => { sub.style.opacity = '1'; }, 200);
      }
    }, 80);
  }, 1500);

  // Terminal lines starting at 3s
  const linesEl = document.getElementById('splash-lines');
  SPLASH_LINES.forEach((text, i) => {
    const div = document.createElement('div');
    div.className = 'sl';
    div.textContent = text;
    linesEl.appendChild(div);

    setTimeout(() => {
      div.classList.add('show');
      AudioEngine.boot_progress();
    }, 3000 + i * 450);
  });

  // Show version
  setTimeout(() => {
    document.getElementById('splash-version').style.opacity = '1';
  }, 3000 + SPLASH_LINES.length * 450 + 200);

  // Boot complete sound
  setTimeout(() => {
    AudioEngine.boot_complete();
  }, 3000 + SPLASH_LINES.length * 450 + 500);

  // End splash after 12s
  setTimeout(() => {
    document.getElementById('splash').classList.add('out');
    setTimeout(callback, 800);
  }, 12000);
}


// ── Navigation System ──────────────────────────────────────────
const Nav = (function() {
  const stack = [];
  let current = null;

  function go(sectionId, pushToStack) {
    if (current === sectionId) return;
    if (pushToStack !== false && current) {
      stack.push(current);
    }
    current = sectionId;
    renderSection(sectionId);
    updateBackBtn();
    // Push browser history
    if (pushToStack !== false) {
      history.pushState({ section: sectionId }, '', '#' + sectionId);
    }
    AudioEngine.nav_select();
    // 20% chance of bonus retro sound
    if (Math.random() < 0.2) {
      const retros = ['retro_arpeggio','retro_coin','retro_powerup','retro_jump','retro_1up'];
      setTimeout(() => AudioEngine[retros[Math.floor(Math.random()*retros.length)]](), 200);
    }
  }

  function back() {
    if (stack.length > 0) {
      const prev = stack.pop();
      current = prev;
      renderSection(prev);
      updateBackBtn();
      AudioEngine.nav_back();
    }
  }

  function updateBackBtn() {
    const btn = document.getElementById('back-btn');
    btn.style.visibility = stack.length > 0 ? 'visible' : 'hidden';
  }

  function getCurrent() { return current; }
  function getStack() { return [...stack]; }

  return { go, back, getCurrent, getStack, updateBackBtn };
})();


// ── RPC Client ─────────────────────────────────────────────────
async function rpcCall(method, params) {
  try {
    const resp = await fetch(RPC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params: params || [] })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || 'RPC error');
    return data.result;
  } catch(e) {
    return null;
  }
}


// ── Clock ──────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const s = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('hdr-clock').textContent = h + ':' + m + ':' + s + 'Z';
}

// ── Block height poller ────────────────────────────────────────
let cachedInfo = null;
async function pollBlockHeight() {
  const info = await rpcCall('getinfo');
  if (info) {
    cachedInfo = info;
    const h = info.blocks !== undefined ? info.blocks : '---';
    document.getElementById('hdr-blockh').textContent = 'BLK ' + h;
    document.getElementById('hdr-blockh').classList.remove('stat-err');
  } else {
    document.getElementById('hdr-blockh').textContent = 'OFFLINE';
    document.getElementById('hdr-blockh').classList.add('stat-err');
  }
}

    const d = icon.d;

      const ci = parseInt(d[i]);

// ── SOST Sigma Logo (pixel art, theme-aware) ──────────────────
function drawSOSTLogo(canvas, size, color) {
  const s = size || 32;
  canvas.width = 16; canvas.height = 16;
  canvas.style.width = s + 'px';
  canvas.style.height = s + 'px';
  canvas.style.imageRendering = 'pixelated';
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 16, 16);
  const c = color || THEME_COLOR || '#00ff41';
  // Sigma (Σ) pixel art 16x16
  // Row by row: 1=filled
  const S = [
    '0011111111111100',
    '0011111111111100',
    '0011100000000000',
    '0001110000000000',
    '0000111000000000',
    '0000011100000000',
    '0000001110000000',
    '0000000111000000',
    '0000001110000000',
    '0000011100000000',
    '0000111000000000',
    '0001110000000000',
    '0011100000000000',
    '0011111111111100',
    '0011111111111100',
    '0000000000000000',
  ];
  // Draw with glow effect (dim version behind)
  const dimC = c + '44'; // semi-transparent glow
  for (let y = 0; y < 16; y++) {
    for (let x = 0; x < 16; x++) {
      if (S[y][x] === '1') {
        // Glow pixel (1px border)
        ctx.fillStyle = dimC;
        if (x > 0 && S[y][x-1] === '0') ctx.fillRect(x-1, y, 1, 1);
        if (x < 15 && S[y][x+1] === '0') ctx.fillRect(x+1, y, 1, 1);
        // Main pixel
        ctx.fillStyle = c;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }
}

// Track all live logo canvases for theme updates
const _logoCanvases = [];
function createLogoCanvas(size) {

}


// ── Section Renderers ──────────────────────────────────────────
// Per-section auto-refresh intervals. renderSection() clears any handle
// registered by the previous section before building the new one, so
// background polls don't leak when the user navigates away.
window._sectionIntervals = window._sectionIntervals || [];
function _clearSectionIntervals() {
  (window._sectionIntervals || []).forEach(function(h) { try { clearInterval(h); } catch(e) {} });
  window._sectionIntervals = [];
}
function _registerSectionInterval(h) { window._sectionIntervals.push(h); }

function renderSection(id) {
  _clearSectionIntervals();
  const content = document.getElementById('content');
  // Clear iframes first to stop loading
  content.querySelectorAll('iframe').forEach(f => f.src = 'about:blank');
  content.innerHTML = '';
  content.style.padding = '';
  content.style.overflow = '';

  const renderer = SectionRenderers[id];
  if (renderer) renderer(content);
  setTimeout(addTooltips, 300);

  // Add ↗ link to web for each section title. The icon opens the full web
  // page where the user can actually operate (purchase, register, sign, etc).
  const sectionLinks = {
    dashboard: '/sost-explorer.html',
    security: '/sost-security.html',
    geaspirit: '/sost-geaspirit.html',
    materials: '/sost-materials-engine.html',
    documents: '/sost-whitepaper.html',
    markets: '/sost-markets.html',
    popc: '/sost-popc.html',
    otc: '/sost-otc.html',
    tokenomics: '/sost-tokenomics.html',
    roadmap: '/sost-roadmap.html',
    foundation: '/sost-foundation.html',
    faq: '/sost-faq.html',
  };
  if (sectionLinks[id]) {
    const h2s = content.querySelectorAll('h2');
    if (h2s.length > 0) {
      const link = document.createElement('a');
      link.href = 'https://sostcore.com' + sectionLinks[id];
      link.target = '_blank';
      link.textContent = ' ↗';
      link.style.cssText = 'color:var(--pip-dim);text-decoration:none;font-size:14px;margin-left:8px;opacity:0.6;';
      link.title = 'Open on web';
      h2s[0].appendChild(link);
    }
  }

  // Add SOST logo + random pixel art at bottom of section
  if (id !== 'wallet' && id !== 'explorer' && id !== 'markets') {
    const decor = document.createElement('div');
    decor.style.cssText = 'display:flex;justify-content:center;align-items:center;gap:16px;padding:24px 0;opacity:0.6;flex-wrap:wrap;';
    // SOST logo in center
    const sLogo = createLogoCanvas(40);
    // Random icons around it
    const count = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      const c = document.createElement('canvas');
      PixelArt.random(c, 36);
      decor.appendChild(c);
    }
    decor.insertBefore(sLogo, decor.children[Math.floor(decor.children.length / 2)]);
    content.appendChild(decor);
  }
  console.log('[PixelArt] Section decorated:', id, '| Library has', PixelArt.count, 'icons');
}

  el.innerHTML = `

    </div>
    <div class="pip-panel">
      <h2>// CONSENSUS</h2>
      <div class="stat-row"><span class="stat-label">POW ALGORITHM</span><span class="stat-value">CONVERGENCEX</span></div>
      <div class="stat-row"><span class="stat-label">DIFFICULTY</span><span class="stat-value">CASERT BITQ (Q16.16)</span></div>
      <div class="stat-row"><span class="stat-label">EQUALIZER</span><span class="stat-value">CASERT EQUALIZER (40 profiles E4–H35)</span></div>
      <div class="stat-row"><span class="stat-label">COINBASE MATURITY</span><span class="stat-value">1000 BLOCKS</span></div>
      <div class="stat-row"><span class="stat-label">MAX BLOCK SIZE</span><span class="stat-value">1,000,000 BYTES</span></div>
      <div class="stat-row"><span class="stat-label">MAX TX SIZE</span><span class="stat-value">100,000 BYTES</span></div>
      <div class="stat-row"><span class="stat-label">MIN RELAY FEE</span><span class="stat-value">1 STOCK/BYTE</span></div>
    </div>
    <div class="pip-panel">
      <h2>// LATEST BLOCKS</h2>
      <div id="dash-blocks"><div class="loading-bar"></div><p style="color:var(--pip-dim)">FETCHING...</p></div>
    </div>
    <div class="pip-panel" style="text-align:center;padding:20px">
      <button onclick="document.getElementById('exit-btn').click()" style="
        background:none;border:2px solid var(--pip);color:var(--pip);font-size:16px;
        padding:12px 32px;cursor:pointer;letter-spacing:3px;font-family:inherit;
        transition:all 0.3s">⏻ EXIT SESSION</button>
    </div>
  `;

  // Named loaders so we can call them on an interval. Each loader is
  // resilient to the section being swapped out: it bails if the target
  // DOM node is gone, which happens when the user navigates away.
  async function loadDashStatus() {
    const info = await rpcCall('getinfo');
    const statusEl = document.getElementById('dash-status');
    if (!statusEl) return;
    if (info) {
      AudioEngine.success_connect();
      const height = info.blocks !== undefined ? info.blocks : 'N/A';
      const rawBitsQ = info.difficulty !== undefined ? parseInt(info.difficulty) : 0;
      const diffReadable = rawBitsQ > 0 ? (rawBitsQ / 65536).toFixed(3) : 'N/A';
      const diffDisplay = rawBitsQ > 0 ? `${diffReadable} (${rawBitsQ.toLocaleString()} bitsQ)` : 'N/A';
      const conns = info.connections !== undefined ? info.connections : 'N/A';
      const ver = info.version || info.subversion || 'N/A';
      const mempool = info.mempool_size !== undefined ? info.mempool_size : (info.mempoolsize !== undefined ? info.mempoolsize : 0);
      // Calculate SOST PoPC reference price
      // Calculate supply
      const R0 = 7.85100863, Q = 0.7788007830714049, EP = 131553;
      let totalSupply = 0, bh2 = 0, h2 = height || 2254;
      while (bh2 <= h2) { let ep = Math.floor(bh2/EP); let r = R0*Math.pow(Q,ep); let ee = Math.min((ep+1)*EP-1,h2); totalSupply += r*(ee-bh2+1); bh2 = ee+1; }
      const supplyDisplay = totalSupply.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + ' SOST';
      const goldVault = '~' + (totalSupply * 0.25).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + ' SOST (25% of emission)';
      const popcPool = '~' + (totalSupply * 0.25).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + ' SOST (25% of emission)';

      // Calculate SOST PoPC reference price
      let sostPrice = 'N/A';
      try {
        const goldResp = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether-gold,pax-gold&vs_currencies=usd');
        const goldData = await goldResp.json();
        const xautP = goldData['tether-gold'] ? goldData['tether-gold'].usd : 0;
        const paxgP = goldData['pax-gold'] ? goldData['pax-gold'].usd : 0;
        if (xautP > 0 || paxgP > 0) {
          const avgGold = (xautP && paxgP) ? (xautP + paxgP) / 2 : (xautP || paxgP);
          const refPrice = (1.2 * avgGold) / totalSupply;
          sostPrice = '$' + (refPrice < 0.01 ? refPrice.toFixed(6) : refPrice.toFixed(4));
        }
      } catch(e) { sostPrice = 'N/A'; }

      // Fetch best block hash and detail
      let bestHash = 'N/A', interval = 'N/A', lastBlockTime = 'N/A', subsidy = 'N/A';
      try {
        const bh = await rpcCall('getblockhash', [height]);
        if (bh) bestHash = bh;
        const block = await rpcCall('getblock', [bestHash]);
        if (block) {
          // Subsidy
          if (block.subsidy) subsidy = (parseFloat(block.subsidy) / 1e8).toFixed(4) + ' SOST';
          else if (block.miner_reward) subsidy = (parseFloat(block.miner_reward) / 1e8).toFixed(4) + ' SOST (miner)';
          // Last block time
          if (block.time) {
            const ago = Math.floor(Date.now()/1000 - block.time);
            if (ago < 60) lastBlockTime = ago + 's ago';
            else if (ago < 3600) lastBlockTime = Math.floor(ago/60) + 'm ago';
            else lastBlockTime = Math.floor(ago/3600) + 'h ' + Math.floor((ago%3600)/60) + 'm ago';
          }
          // Interval (need previous block)
          if (block.previousblockhash && block.time) {
            try {
              const prev = await rpcCall('getblock', [block.previousblockhash]);
              if (prev && prev.time) {
                const iv = block.time - prev.time;
                const ivMin = Math.floor(iv / 60);
                const ivSec = iv % 60;
                interval = ivMin + 'm ' + ivSec + 's';
              }
            } catch(e) {}
          }
        }
      } catch(e) {}

      // Mempool detail
      let mempoolDisplay = mempool + ' TX';
      if (mempool > 0) {
        try {
          const mpInfo = await rpcCall('getmempoolinfo');
          if (mpInfo) {
            const bytes = mpInfo.bytes || 0;
            const fees = mpInfo.total_fees || 0;
            mempoolDisplay = `${mempool} TX · ${bytes.toLocaleString()} B · ${(fees/1e8).toFixed(4)} SOST fees`;
          }
        } catch(e) {}
      }

      // Fetch connected nodes count via getpeerinfo
      let connectedNodes = 'N/A';
      try {
        const peers = await rpcCall('getpeerinfo');
        if (Array.isArray(peers)) {
          connectedNodes = peers.filter(p => p.version_acked).length;
        }
      } catch(e) { connectedNodes = 'N/A'; }

      // Count unique miners from last 20 blocks
      let uniqueMiners = 'N/A';
      try {
        let minerAddrs = new Set();
        const tipHash = await rpcCall('getblockhash', [parseInt(height)]);
        let bHash = tipHash;
        for (let i = 0; i < 20 && bHash; i++) {
          const blk = await rpcCall('getblock', [bHash]);
          if (blk && blk.miner_address) minerAddrs.add(blk.miner_address);
          bHash = blk ? blk.previousblockhash : null;
        }
        uniqueMiners = minerAddrs.size;
      } catch(e) { uniqueMiners = 'N/A'; }

      // Interval color
      let ivColor = 'var(--pip)';
      if (interval !== 'N/A') {
        const parts = interval.match(/(\d+)m/);
        const mins = parts ? parseInt(parts[1]) : 0;
        if (mins > 15) ivColor = '#fb010d';
        else if (mins >= 10) ivColor = '#fbbf24';
        else ivColor = '#4ade80';
      }

      // Calculate expected blocks and chain lag/lead.
      // C++ CONVENTION: positive = ahead, negative = behind (matches casert.cpp).
      // Invariant: actual - expected === lag. When the RPC lag (computed at tip time
      // by the node) is available we derive expected backwards from it so all three
      // numbers stay coherent on screen, instead of mixing tip-time and wall-clock sources.
      const GENESIS_TIME = 1773597600; // 2026-03-15 18:00 UTC
      const nowSec = Math.floor(Date.now() / 1000);
      const realBlocks = (height !== 'N/A' && height !== undefined) ? parseInt(height) : 0;
      const rpcLag = (info.casert_lag !== undefined && info.casert_lag !== null)
          ? parseInt(info.casert_lag) : null;
      const lag = rpcLag !== null ? rpcLag : (realBlocks - Math.floor((nowSec - GENESIS_TIME) / 600));
      const expectedBlocks = realBlocks - lag;
      let lagLeadText, lagLeadColor;
      if (lag < 0) {
        lagLeadText = Math.abs(lag) + ' behind';
        lagLeadColor = '#fb010d';
      } else if (lag > 0) {
        lagLeadText = lag + ' ahead';
        lagLeadColor = '#4ade80';
      } else {
        lagLeadText = 'on schedule';
        lagLeadColor = '#4ade80';
      }

      // cASERT profile: use RPC casert_profile (authoritative from C++ PID controller)
      const casertProfile = info.casert_profile || 'B0';

      statusEl.innerHTML = `
        <div class="stat-row"><span class="stat-label">STATUS</span><span class="stat-value stat-ok"><span class="stat-badge ok">ONLINE</span></span></div>
        <div class="stat-row"><span class="stat-label">SOST PRICE</span><span class="stat-value" style="color:#ffd700;font-weight:700">${sostPrice} <span style="font-size:9px;color:var(--pip-dim);font-weight:400">(PoPC ref.)</span></span></div>
        <div style="padding:2px 12px;font-size:9px;color:#777;line-height:1.4">PoPC Reference · Not listed · 1.2 oz gold ÷ supply</div>
        <div class="stat-row"><span class="stat-label">TOTAL SUPPLY</span><span class="stat-value">${supplyDisplay}</span></div>
        <div class="stat-row"><span class="stat-label">GOLD VAULT</span><span class="stat-value" style="color:#b8860b">${goldVault}</span></div>
        <div class="stat-row"><span class="stat-label">POPC POOL</span><span class="stat-value" style="color:#22d3ee">${popcPool}</span></div>
        <div class="stat-row"><span class="stat-label">BLOCK HEIGHT</span><span class="stat-value">${height}</span></div>
        <div class="stat-row"><span class="stat-label">EXPECTED BLOCKS</span><span class="stat-value" style="color:var(--pip-dim)">${expectedBlocks} <span style="font-size:9px">(@10min/block)</span></span></div>
        <div class="stat-row"><span class="stat-label">CHAIN LAG/LEAD</span><span class="stat-value" style="color:${lagLeadColor};font-weight:700">${lagLeadText}</span></div>
        <div class="stat-row"><span class="stat-label">ACTIVE MINERS</span><span class="stat-value">${uniqueMiners} <span style="font-size:9px;color:var(--pip-dim)">(last 20 blocks)</span></span></div>
        <div class="stat-row"><span class="stat-label">CONNECTED NODES</span><span class="stat-value">${connectedNodes} <span style="font-size:9px;color:var(--pip-dim)">(seed-visible)</span></span></div>
        <div class="stat-row"><span class="stat-label">DIFFICULTY</span><span class="stat-value">${diffDisplay}</span></div>
        <div class="stat-row"><span class="stat-label">INTERVAL</span><span class="stat-value" style="color:${ivColor}">${interval}</span></div>
        <div class="stat-row"><span class="stat-label">LAST BLOCK</span><span class="stat-value">${lastBlockTime}</span></div>
        <div class="stat-row"><span class="stat-label">CASERT PROFILE</span><span class="stat-value">${casertProfile}</span></div>
        <div class="stat-row"><span class="stat-label">SUBSIDY</span><span class="stat-value">${subsidy}</span></div>
        <div class="stat-row"><span class="stat-label">MEMPOOL</span><span class="stat-value">${mempoolDisplay}</span></div>
        <div class="stat-row"><span class="stat-label">CONNECTIONS</span><span class="stat-value">${conns}</span></div>
        <div class="stat-row"><span class="stat-label">VERSION</span><span class="stat-value">${ver}</span></div>
        <div class="stat-row"><span class="stat-label">BEST HASH</span><span class="stat-value" style="font-size:11px;word-break:break-all">${bestHash}</span></div>
      `;
      setTimeout(addTooltips, 500);
    } else {
      statusEl.innerHTML = `
        <div class="stat-row"><span class="stat-label">STATUS</span><span class="stat-value"><span class="stat-badge err">OFFLINE</span></span></div>
        <div class="stat-row"><span class="stat-label">NODE</span><span class="stat-value stat-err">UNREACHABLE</span></div>
        <div class="stat-row"><span class="stat-label">RPC ENDPOINT</span><span class="stat-value" style="font-size:14px">${RPC_URL}</span></div>
      `;
    }
  }

  async function loadDashBlocks() {
    const blocksEl = document.getElementById('dash-blocks');
    if (!blocksEl) return;
    const info = await rpcCall('getinfo');
    if (!info || info.blocks === undefined) {
      blocksEl.innerHTML = '<p class="stat-err">NODE OFFLINE - NO BLOCK DATA</p>';
      return;
    }
    const height = info.blocks;
    let html = '';
    const count = Math.min(8, height + 1);
    for (let i = 0; i < count; i++) {
      const h = height - i;
      const bHash = await rpcCall('getblockhash', [h]);
      if (bHash) {
        const block = await rpcCall('getblock', [bHash]);
        if (block) {
          const txCount = block.tx ? block.tx.length : (block.nTx || '?');
          const time = block.time ? new Date(block.time * 1000).toISOString().replace('T',' ').substring(0,19) + 'Z' : '?';
          html += `<div class="stat-row" onclick="showBlockDetail(${h})" style="cursor:pointer;transition:background 0.2s" onmouseover="this.style.background='rgba(var(--pip-rgb,0,255,65),0.05)'" onmouseout="this.style.background='none'">
            <span class="stat-label" style="color:var(--pip)">#${h}</span>
            <span class="stat-value" style="font-size:13px">${txCount} tx | ${time}</span>
          </div>`;
        }
      }
    }
    blocksEl.innerHTML = html || '<p style="color:var(--pip-dim)">NO BLOCKS RETRIEVED</p>';
  }

  // Initial load + refresh every 10s while the dashboard is visible.
  // renderSection() clears this interval automatically on navigation.
  loadDashStatus();
  loadDashBlocks();
  _registerSectionInterval(setInterval(function() {
    if (!document.getElementById('dash-status')) return; // section swapped
    loadDashStatus();
    loadDashBlocks();
  }, 10000));

  setTimeout(addTooltips, 2000);
};

      el.parentElement.appendChild(tipDiv);
      el.addEventListener('click', () => { tipDiv.style.display = tipDiv.style.display === 'none' ? 'block' : 'none'; });

  });
}

// ── Theme color utility ────────────────────────────────────────
function applyThemeColor(color) {
  THEME_COLOR = color;
  const r = document.documentElement.style;
  r.setProperty('--pip', color);
  // Compute dim and dark variants
  const c = parseInt(color.slice(1), 16);
  const rd = (c >> 16) & 0xff, gd = (c >> 8) & 0xff, bd = c & 0xff;
  const dim = '#' + [Math.floor(rd*0.65), Math.floor(gd*0.65), Math.floor(bd*0.65)]
    .map(v => v.toString(16).padStart(2,'0')).join('');
  const dark = '#' + [Math.floor(rd*0.2), Math.floor(gd*0.2), Math.floor(bd*0.2)]
    .map(v => v.toString(16).padStart(2,'0')).join('');
  const glow = `rgba(${rd},${gd},${bd},0.4)`;
  r.setProperty('--pip-dim', dim);
  r.setProperty('--pip-dark', dark);
  r.setProperty('--pip-glow', glow);
  r.setProperty('--pip-border', color);
  // Refresh all SOST pixel logos with new theme color
  refreshAllLogos();
  // Also refresh header and menu logos
  const hdrLogo = document.getElementById('hdr-logo-canvas');
  if (hdrLogo) drawSOSTLogo(hdrLogo, 28, color);
  const menuLogo = document.getElementById('menu-logo-canvas');
  if (menuLogo) drawSOSTLogo(menuLogo, 48, color);
}


// ── Menu System ────────────────────────────────────────────────
function buildMenu() {
  const container = document.getElementById('menu-items');
  SECTIONS.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.innerHTML = `<span class="mi-num">${sec.icon}</span> ${sec.label}`;
    div.addEventListener('click', () => {
      closeMenu();
      AudioEngine.nav_select();
      Nav.go(sec.id);
    });
    container.appendChild(div);
  });
  // EXIT item at bottom of menu
  const exitDiv = document.createElement('div');
  exitDiv.className = 'menu-item';
  exitDiv.style.color = 'var(--pip-red)';
  exitDiv.style.marginTop = '16px';
  exitDiv.style.borderTop = '1px solid var(--pip-dark)';
  exitDiv.style.paddingTop = '16px';
  exitDiv.innerHTML = '<span class="mi-num" style="color:var(--pip-red)">✕</span> EXIT';
  exitDiv.addEventListener('click', () => {
    closeMenu();

  });

function openMenu() {
  document.getElementById('menu-overlay').classList.add('open');
  AudioEngine.nav_menu_open();
  // Highlight current
  const items = document.querySelectorAll('.menu-item');
  items.forEach((item, i) => {
    item.classList.toggle('active', SECTIONS[i].id === Nav.getCurrent());
  });
}

function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
  AudioEngine.nav_menu_close();
}


// ── Event Bindings ─────────────────────────────────────────────
function bindEvents() {
  // Header buttons
  document.getElementById('back-btn').addEventListener('click', () => Nav.back());
  document.getElementById('menu-btn').addEventListener('click', () => {
    const overlay = document.getElementById('menu-overlay');
    if (overlay.classList.contains('open')) closeMenu();
    else openMenu();
  });
  document.getElementById('logo-btn').addEventListener('click', () => {
    AudioEngine.nav_home();
    window.open('https://sostcore.com/?from=app', '_blank');
  });
  document.getElementById('exit-btn').addEventListener('click', () => {
    AudioEngine.sys_shutdown();
    document.querySelectorAll('iframe').forEach(f => { try { f.src = 'about:blank'; } catch(e) {} });
    document.getElementById('session-ended').classList.add('show');
    setTimeout(() => {
      // PWA standalone: window.close() works
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        try { window.close(); } catch(e) {}
        try { history.go(-(history.length - 1)); } catch(e) {}
        return;
      }
      // Browser: try close, then show toast
      try { window.close(); } catch(e) {}
      setTimeout(() => {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--pip);color:var(--pip);padding:12px 24px;font-family:monospace;font-size:14px;z-index:99999;border-radius:4px;text-align:center';
        t.innerHTML = 'Close this tab manually<br><span style="font-size:11px;opacity:0.5">Browser blocks programmatic tab close</span>';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 8000);
      }, 800);
    }, 3000);
  });
  document.getElementById('menu-close-btn').addEventListener('click', closeMenu);

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    const overlay = document.getElementById('menu-overlay');
    const menuOpen = overlay.classList.contains('open');

    if (e.key === 'Escape') {
      if (menuOpen) { closeMenu(); e.preventDefault(); }
      else if (Nav.getStack().length > 0) { Nav.back(); e.preventDefault(); }
    }

    // Number keys for menu when open
    if (menuOpen && e.key >= '0' && e.key <= '9') {
      const idx = e.key === '0' ? 9 : parseInt(e.key) - 1;
      if (SECTIONS[idx]) {
        closeMenu();
        AudioEngine.nav_select();
        Nav.go(SECTIONS[idx].id);
        e.preventDefault();
      }
    }
  });

  // Browser back button
  window.addEventListener('popstate', (e) => {
    if (e.state && e.state.section) {
      Nav.go(e.state.section, false);
    } else {
      Nav.back();
    }
  });
}

    const savedSound = localStorage.getItem('sost_sound');
    if (savedSound !== null) SOUND_ENABLED = savedSound === '1';

    if (savedTheme) applyThemeColor(savedTheme);
  } catch(e) {}
}


// ── PWA Service Worker ─────────────────────────────────────────
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update();
      console.log('[SW] Registered, checking for updates...');
      // When new SW takes over, reload to get fresh shell
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (newSW) {
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'activated') {
              console.log('[SW] New version activated');
            }
          });
        }
      });
    }).catch(() => {});
    // Detect SW controller change (new SW took over)
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      console.log('[SW] Controller changed — new SW active');
    });
  }
}


// Block/TX detail overlay
function showBlockDetail(heightOrHash) {
  const overlay = document.getElementById('block-detail-overlay');
  const content = document.getElementById('bdo-content');
  if (!overlay || !content) return;
  content.innerHTML = '<button class="bdo-close" onclick="document.getElementById(\'block-detail-overlay\').classList.remove(\'show\')">&times;</button><p style="color:var(--pip-dim)">Loading...</p>';
  overlay.classList.add('show');

  (async () => {
    try {
      let hash = heightOrHash;
      if (/^\d+$/.test(String(heightOrHash))) {
        hash = await rpcCall('getblockhash', [parseInt(heightOrHash)]);
      }
      if (!hash) { content.innerHTML = '<button class="bdo-close" onclick="document.getElementById(\'block-detail-overlay\').classList.remove(\'show\')">&times;</button><p>Block not found</p>'; return; }
      const block = await rpcCall('getblock', [hash]);
      if (!block) { content.innerHTML = '<button class="bdo-close" onclick="document.getElementById(\'block-detail-overlay\').classList.remove(\'show\')">&times;</button><p>Block data unavailable</p>'; return; }

      const fields = [
        ['HEIGHT', block.height],
        ['HASH', hash],
        ['PREV HASH', block.previousblockhash || 'genesis'],
        ['TIMESTAMP', block.time ? new Date(block.time*1000).toISOString() : 'N/A'],
        ['DIFFICULTY', block.bits_q ? (block.bits_q/65536).toFixed(3) : block.difficulty],
        ['TRANSACTIONS', block.tx_count || block.nTx || (block.tx?block.tx.length:'?')],
        ['MERKLE ROOT', block.merkleroot || 'N/A'],
        ['MINER', block.miner_address || 'N/A'],
        ['SUBSIDY', block.subsidy ? (block.subsidy/1e8).toFixed(8)+' SOST' : 'N/A'],
        ['SIZE', block.size ? block.size+' bytes' : 'N/A'],
      ];

      let html = '<button class="bdo-close" onclick="document.getElementById(\'block-detail-overlay\').classList.remove(\'show\')">&times;</button>';
      html += '<h3 style="color:var(--pip);margin:0 0 12px">// BLOCK #' + block.height + '</h3>';
      fields.forEach(([k,v]) => { html += '<div class="bdo-row"><span class="bdo-key">'+k+'</span><span class="bdo-val">'+v+'</span></div>'; });
      content.innerHTML = html;
      AudioEngine.click_soft();
    } catch(e) {
      content.innerHTML = '<button class="bdo-close" onclick="document.getElementById(\'block-detail-overlay\').classList.remove(\'show\')">&times;</button><p>Error: '+e.message+'</p>';
    }
  })();
}

function showTxDetail(txid) {
  const overlay = document.getElementById('block-detail-overlay');
  const content = document.getElementById('bdo-content');
  if (!overlay || !content) return;
  const closeBtn = '<button class="bdo-close" onclick="document.getElementById(\'block-detail-overlay\').classList.remove(\'show\')">&times;</button>';
  content.innerHTML = closeBtn + '<p style="color:var(--pip-dim)">Loading TX...</p>';
  overlay.classList.add('show');

  (async () => {
    try {
      const tx = await rpcCall('getrawtransaction', [txid, true]);
      if (!tx) { content.innerHTML = closeBtn + '<p>TX not found — node may not have tx-index enabled</p>'; return; }

      let html = closeBtn;
      html += '<h3 style="color:var(--pip);margin:0 0 12px">// TRANSACTION</h3>';
      html += '<div class="bdo-row"><span class="bdo-key">TXID</span><span class="bdo-val" style="font-size:10px">' + txid + '</span></div>';

      if (tx.blockhash) html += '<div class="bdo-row"><span class="bdo-key">BLOCK</span><span class="bdo-val" style="cursor:pointer;color:var(--pip)" onclick="showBlockDetail(\'' + tx.blockhash + '\')">' + (tx.height || tx.blockhash.substring(0,16) + '...') + '</span></div>';
      if (tx.confirmations !== undefined) html += '<div class="bdo-row"><span class="bdo-key">CONFIRMATIONS</span><span class="bdo-val">' + tx.confirmations + '</span></div>';
      if (tx.size) html += '<div class="bdo-row"><span class="bdo-key">SIZE</span><span class="bdo-val">' + tx.size + ' bytes</span></div>';

      // Inputs
      if (tx.vin && tx.vin.length > 0) {
        html += '<h4 style="color:var(--pip-dim);margin:12px 0 6px;font-size:11px">INPUTS (' + tx.vin.length + ')</h4>';
        tx.vin.forEach((inp, i) => {
          if (inp.coinbase) {
            html += '<div class="bdo-row"><span class="bdo-key">IN[' + i + ']</span><span class="bdo-val" style="color:#fbbf24">COINBASE</span></div>';
          } else {
            const prevTx = (inp.txid || '').substring(0, 12) + '...:' + (inp.vout !== undefined ? inp.vout : '?');
            html += '<div class="bdo-row"><span class="bdo-key">IN[' + i + ']</span><span class="bdo-val">' + prevTx + '</span></div>';
          }
        });
      }

      // Outputs
      if (tx.vout && tx.vout.length > 0) {
        html += '<h4 style="color:var(--pip-dim);margin:12px 0 6px;font-size:11px">OUTPUTS (' + tx.vout.length + ')</h4>';
        tx.vout.forEach((out, i) => {
          const addr = out.address || (out.scriptPubKey && out.scriptPubKey.addresses && out.scriptPubKey.addresses[0]) || 'unknown';
          const amt = out.value !== undefined ? parseFloat(out.value).toFixed(8) : (out.amount !== undefined ? parseFloat(out.amount).toFixed(8) : '?');
          html += '<div class="bdo-row"><span class="bdo-key">OUT[' + i + '] ' + addr.substring(0,20) + '...</span><span class="bdo-val" style="color:var(--pip)">' + amt + ' SOST</span></div>';
        });
      }

      if (tx.fee !== undefined) html += '<div class="bdo-row"><span class="bdo-key">FEE</span><span class="bdo-val" style="color:#f00">' + tx.fee + ' SOST</span></div>';

      content.innerHTML = html;
      AudioEngine.click_soft();
    } catch(e) {
      content.innerHTML = closeBtn + '<p>TX lookup failed: ' + e.message + '</p><p style="font-size:11px;color:var(--pip-dim)">Node may not support getrawtransaction or tx-index may be disabled.</p>';
    }
  })();
}

// Close overlay on ESC
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const o = document.getElementById('block-detail-overlay');
    if (o && o.classList.contains('show')) { o.classList.remove('show'); e.preventDefault(); }
  }
});

// ── Initialize ─────────────────────────────────────────────────
function init() {
  loadSettings();
  buildMenu();
  bindEvents();
  registerSW();

  // Capture PWA install prompt GLOBALLY (fires before user reaches Settings)
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window._deferredInstallPrompt = e;
    console.log('[PWA] Install prompt captured and ready');
  });

  // Unlock AudioContext on first interaction
  let audioUnlocked = false;
  const unlockAudio = () => {
    AudioEngine.click_soft();
    audioUnlocked = true;
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('touchstart', unlockAudio);
    console.log('[Audio] Unlocked. 60 retro sounds available.');
  };
  document.addEventListener('click', unlockAudio);
  document.addEventListener('touchstart', unlockAudio);

  // Ambient retro sounds every 20-30 seconds
  const ambientSounds = ['ambient_scan','ambient_beep','ambient_pulse','ambient_hum',
    'retro_arpeggio','retro_coin','retro_warp'];
  setInterval(() => {
    if (SOUND_ENABLED && audioUnlocked) {
      const snd = ambientSounds[Math.floor(Math.random() * ambientSounds.length)];
      try { AudioEngine[snd](); } catch(e) {}
    }
  }, 20000 + Math.random() * 15000);

  // Start splash
  runSplash(() => {
    const app = document.getElementById('app');
    app.classList.add('visible');

    // Initialize pixel art logos in header and menu
    drawSOSTLogo(document.getElementById('hdr-logo-canvas'), 28, THEME_COLOR);
    drawSOSTLogo(document.getElementById('menu-logo-canvas'), 48, THEME_COLOR);

    Nav.go('dashboard');
    Nav.updateBackBtn();

    // Start periodic updates
    updateClock();
    setInterval(updateClock, 5000);
    pollBlockHeight();
    setInterval(pollBlockHeight, 30000);

    // Ambient hum every 45s
    setInterval(() => {
      if (SOUND_ENABLED && Math.random() > 0.5) AudioEngine.ambient_hum();
    }, 45000);
  });
}

// Boot
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>

<script>
// === UNIFIED AUTH FOR APP — Server-side only. No client-side fallback. No hardcoded codes. ===
// Mirrors sost-geaspirit.html and sost-materials-engine.html auth flow exactly.
(function(){
  function appAuth(prefix, overlayId) {
    var loginBtn = document.getElementById(prefix+'-login-btn');
    var totpBtn = document.getElementById(prefix+'-totp-btn');
    if (!loginBtn) return;

    var _timer = null, _seconds = 0;

    function startSession() {
      _seconds = 600;
      var info = document.getElementById(prefix+'-session-info');
      if (info) info.style.display = '';
      if (_timer) clearInterval(_timer);
      _timer = setInterval(function() {
        _seconds--;
        var el = document.getElementById(prefix+'-timer');
        if (el) {
          var m = Math.floor(_seconds/60), s = _seconds%60;
          el.textContent = m+':'+(s<10?'0':'')+s;
        }
        if (_seconds <= 0) { lockSession(); }
      }, 1000);
    }

    function lockSession() {
      if (_timer) clearInterval(_timer);
      var ov = document.getElementById(overlayId);
      if (ov) ov.style.display = 'flex';
      var info = document.getElementById(prefix+'-session-info');
      if (info) info.style.display = 'none';
      var ls = document.getElementById(prefix+'-login-step');
      var ts = document.getElementById(prefix+'-totp-step');
      if (ls) ls.style.display = '';
      if (ts) ts.style.display = 'none';
      var msg = document.getElementById(prefix+'-msg');
      if (msg) { msg.textContent = 'SESSION EXPIRED — login again'; msg.style.color = '#ffaa00'; }
    }

    window[prefix.replace('-','')+'AppRefresh'] = function() { _seconds = 600; };

    loginBtn.addEventListener('click', async function() {
      var u = document.getElementById(prefix+'-user').value.trim();
      var p = document.getElementById(prefix+'-pwd').value;
      var msg = document.getElementById(prefix+'-msg');
      if (!u || !p) { msg.textContent = 'Enter username and password'; msg.style.color = '#ff0000'; return; }
      msg.textContent = 'Authenticating...'; msg.style.color = 'var(--pip-dim)';
      try {
        var r = await fetch('/auth/login', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username: u, password: p})
        });
        if (r.ok) {
          var d = await r.json();
          if (d.requires_otp) {
            document.getElementById(prefix+'-login-step').style.display = 'none';
            document.getElementById(prefix+'-totp-step').style.display = '';
            return;
          }
          if (d.status === 'authenticated') {
            document.getElementById(overlayId).style.display = 'none';
            startSession();
            try { AudioEngine.success_big(); } catch(e) {}
            return;
          }
        }
        if (r.status === 429) { msg.textContent = 'Too many attempts. Wait and retry.'; msg.style.color = '#ff0000'; return; }
        msg.textContent = 'Invalid credentials'; msg.style.color = '#ff0000';
        try { AudioEngine.error_hard(); } catch(e) {}
      } catch(e) {
        msg.textContent = 'Auth service unavailable'; msg.style.color = '#ff0000';
      }
    });

    if (totpBtn) {
      totpBtn.addEventListener('click', async function() {
        var code = document.getElementById(prefix+'-totp').value.trim();
        var msg = document.getElementById(prefix+'-totp-msg');
        if (!code || code.length !== 6) { msg.textContent = 'Enter 6-digit code'; msg.style.color = '#ff0000'; return; }
        msg.textContent = 'Verifying...'; msg.style.color = 'var(--pip-dim)';
        try {
          var r = await fetch('/auth/verify-otp', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({otp_code: code})
          });
          if (r.ok) {
            document.getElementById(overlayId).style.display = 'none';
            startSession();
            try { AudioEngine.success_big(); } catch(e) {}
            return;
          }
          if (r.status === 429) { msg.textContent = 'Too many attempts.'; msg.style.color = '#ff0000'; return; }
          msg.textContent = 'Invalid code'; msg.style.color = '#ff0000';
        } catch(e) {
          msg.textContent = 'Auth service unavailable'; msg.style.color = '#ff0000';
        }
      });
    }
  }

  // Wait for section renderers to create the DOM elements, then attach auth
  var _authInterval = setInterval(function() {
    if (document.getElementById('gea-app-login-btn')) {
      appAuth('gea-app', 'gea-tech-overlay');
      clearInterval(_authInterval);
    }
  }, 500);
  var _authInterval2 = setInterval(function() {
    if (document.getElementById('mat-app-login-btn')) {
      appAuth('mat-app', 'mat-tech-overlay');
      clearInterval(_authInterval2);
    }
  }, 500);
  // Clean up intervals after 30s
  setTimeout(function() { clearInterval(_authInterval); clearInterval(_authInterval2); }, 30000);
})();
</script>
