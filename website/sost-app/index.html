<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOST">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SOST Protocol</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
.app{display:flex;flex-direction:column;height:100%}
.app-frames{flex:1;position:relative}
.app-frames iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}
.app-frames iframe.hidden{display:none}
.app-nav{display:flex;height:56px;background:#111;border-top:1px solid #222;
  padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;z-index:100}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;color:#666;transition:color .2s;font-size:10px;letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;min-height:52px;user-select:none}
.nav-tab.active{color:#cc0000}
.nav-tab .icon{font-size:22px;margin-bottom:2px}
.nav-tab.active .icon{filter:drop-shadow(0 0 6px rgba(204,0,0,.6))}
</style>
</head>
<body>
<div class="app">
  <div class="app-frames">
    <iframe id="explorer-frame" src="/sost-explorer.html"></iframe>
    <iframe id="wallet-frame" src="/sost-wallet.html" class="hidden"></iframe>
  </div>
  <nav class="app-nav">
    <div class="nav-tab active" onclick="switchTab('explorer')">
      <span class="icon">⛓</span>EXPLORER
    </div>
    <div class="nav-tab" onclick="switchTab('wallet')">
      <span class="icon">💰</span>WALLET
    </div>
  </nav>
</div>
<script>
function switchTab(tab){
  document.getElementById('explorer-frame').classList.toggle('hidden',tab!=='explorer');
  document.getElementById('wallet-frame').classList.toggle('hidden',tab!=='wallet');
  document.querySelectorAll('.nav-tab').forEach(function(el,i){
    el.classList.toggle('active',i===(tab==='explorer'?0:1));
  });
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}
</script>
</body>
</html>
