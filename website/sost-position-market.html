:root{--bg-deep:#000;--bg-panel:#050505;--bg-card:#0a0a0a;--bg-hover:#111;--border-dim:#1a1a1a;--border-med:#2a2a2a;--red-primary:#fb010d;--red-bright:#ff2d3b;--green-primary:#4ade80;--cyan-primary:#22d3ee;--gold:#f59e0b;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-dim:#64748b;--text-muted:#475569;--font-mono:'JetBrains Mono',monospace;--font-display:'Space Grotesk',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}

.hero h1{font-family:var(--font-display);font-size:clamp(28px,5vw,44px);font-weight:700;line-height:1.1;margin-bottom:20px;letter-spacing:-1px}
.hero h1 span{color:var(--gold)}
.hero-sub{font-size:15px;color:var(--text-secondary);max-width:680px;line-height:1.8;font-weight:300}

h2{font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:20px;color:var(--text-primary)}
h2 span{color:var(--gold)}
h3{font-size:14px;font-weight:600;color:var(--gold);margin:24px 0 10px;letter-spacing:1px}
p,li{color:var(--text-secondary);margin-bottom:12px;line-height:1.8}
strong{color:var(--text-primary)}
code{background:#111720;padding:1px 5px;border-radius:3px;font-size:12px;color:var(--red-primary)}
ul{padding-left:20px;margin-bottom:16px}
.card{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:8px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12px}
th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border-med);color:var(--text-muted);font-weight:500;letter-spacing:1px;font-size:10px;text-transform:uppercase}
td{padding:7px 10px;border-bottom:1px solid var(--border-dim);color:var(--text-secondary)}
td:first-child{color:var(--text-primary);font-weight:500}
.note{background:var(--bg-card);border:1px solid var(--border-dim);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:16px 20px;margin:20px 0;font-size:12px;color:var(--text-secondary);line-height:1.8}
.note strong{color:var(--gold)}
.status-badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:3px;letter-spacing:1px;font-weight:600}
.status-alpha{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);color:#fbbf24}
footer{padding:40px 0;text-align:center;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border-dim)}
footer a{color:var(--text-dim);text-decoration:none}
nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.94);border-bottom:1px solid var(--border-dim);backdrop-filter:blur(16px);padding:12px 0}
nav .container{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.nav-logo{font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--text-primary);letter-spacing:3px;text-decoration:none;display:flex;align-items:center;gap:14px}
.nav-logo .brand-sost{color:var(--red-primary)}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:11px;font-weight:400;padding:4px 10px;border-radius:4px;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.nav-links a:hover{color:var(--text-primary);background:rgba(255,255,255,.05)}
.nav-links a.active{color:var(--gold);border-bottom:1px solid var(--gold)}
.nav-hamburger{display:none;background:none;border:1px solid var(--border-dim);color:var(--text-dim);font-size:20px;padding:4px 8px;cursor:pointer;border-radius:4px;line-height:1}
@media(max-width:768px){.nav-hamburger{display:block}.nav-links{display:none;width:100%}.nav-links.open{display:flex}}
