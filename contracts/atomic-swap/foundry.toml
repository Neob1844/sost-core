[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# No RPC endpoints declared on purpose. This sub-project is for local
# Foundry tests only. NO mainnet / testnet deployment from this config.
# Deployment is intentionally a separate operator-side step that requires
# explicit network credentials NOT stored in this repo.
