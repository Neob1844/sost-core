# SOST VPS — TCP / connection-tracking tuning
#
# Solves the "thousands of TIME-WAIT connections to 127.0.0.1:18232"
# saturation pattern observed when nginx talks to sost-node without
# keepalive. Even with the connection pool added in the matching
# nginx config, the kernel side still benefits from these knobs.

# Reuse TIME-WAIT slots for new outgoing connections. Safe on Linux
# 4.10+ (timestamp-validated, not the deprecated tw_recycle).
net.ipv4.tcp_tw_reuse = 1

# Close the TIME-WAIT side faster. Default 60 s; 15 s is enough for a
# single-host loopback pair (nginx ↔ sost-node).
net.ipv4.tcp_fin_timeout = 15

# Larger accept queue so a burst of explorer / wallet requests does not
# get RST'd when sost-node is briefly busy.
net.core.somaxconn = 4096

# Enlarge ephemeral port range so the pool of usable source ports for
# loopback connections never tightens on us.
net.ipv4.ip_local_port_range = 10000 65535

# Cap how many TIME-WAIT slots the kernel keeps. Once exceeded, the
# kernel quietly drops the oldest. Prevents the "200000+ TIME-WAIT"
# slow accumulation we saw in the bug report.
net.ipv4.tcp_max_tw_buckets = 200000
