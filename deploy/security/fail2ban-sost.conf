# /etc/fail2ban/jail.d/sost.conf
# Copy to VPS: sudo cp fail2ban-sost.conf /etc/fail2ban/jail.d/sost.conf

[sost-rpc]
enabled = true
filter = sost-rpc
logpath = /var/log/nginx/access.log
maxretry = 10
findtime = 300
bantime = 3600

[sost-scan]
enabled = true
filter = sost-scan
logpath = /var/log/nginx/access.log
maxretry = 3
findtime = 60
bantime = 86400

[nginx-limit-req]
enabled = true
filter = nginx-limit-req
logpath = /var/log/nginx/error.log
maxretry = 10
findtime = 60
bantime = 3600
