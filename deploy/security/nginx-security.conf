# SOST Security Headers — include in nginx server block
# Usage: include /opt/sost/deploy/security/nginx-security.conf;

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS protection for old browsers
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Disable unnecessary APIs
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# HSTS — 1 year
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# CSP — allows CDN scripts + inline (needed for wallet)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss:; frame-src 'self'; frame-ancestors 'self';" always;

# Block hidden files
location ~ /\. { deny all; return 404; }

# Block backup/sensitive files
location ~* \.(bak|swp|old|orig|save|sql|db|log|env|git)$ { deny all; return 404; }
