# nginx rate limiting for SOST RPC endpoint
# Include this in your nginx server block or http block.
#
# Usage:
#   1. Add to http {} block:  include /path/to/nginx_rpc_ratelimit.conf;
#   2. Add to location block: see the location example below.
#
# Or copy the relevant directives into your existing config.

# --- Place in http {} block ---

# Rate limit zone: 10 requests/second per IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=sost_rpc:10m rate=10r/s;

# Optional: connection limit per IP
limit_conn_zone $binary_remote_addr zone=sost_rpc_conn:5m;

