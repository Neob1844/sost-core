# Materials Engine API proxy — for both sostcore.com and sostprotocol.com
# Add inside server {} blocks of both domain configs
# Then: sudo nginx -t && sudo systemctl reload nginx

# Rate limit zone (add to http {} block if not exists)
# limit_req_zone $binary_remote_addr zone=materials:10m rate=20r/m;

location /api/materials/ {
    # Rate limiting: 20 req/min per IP, burst 10
    # limit_req zone=materials burst=10 nodelay;

    proxy_pass http://127.0.0.1:8100/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;

    # CORS for both domains
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle preflight
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Content-Length 0;
        return 204;
    }
}
