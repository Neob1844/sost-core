# sostprotocol.com → sostcore.com REDIRECT
#
# All traffic from sostprotocol.com is permanently redirected to sostcore.com.
# This ensures:
#   - No broken app/explorer/wallet on the secondary domain
#   - Single canonical origin for SEO
#   - No cross-origin RPC issues
#   - No service worker cache conflicts
#
# INSTALLATION:
#   1. Create a SEPARATE server block for sostprotocol.com
#   2. Remove sostprotocol.com from the main server block
#   3. Test: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
#   5. Verify: curl -I https://sostprotocol.com/
#      Should return 301 → https://sostcore.com/

# Redirect server block for sostprotocol.com
server {
    listen 80;
    listen 443 ssl;
    server_name sostprotocol.com www.sostprotocol.com;

    # SSL certs — adjust paths to match your certbot output
    # ssl_certificate /etc/letsencrypt/live/sostprotocol.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sostprotocol.com/privkey.pem;

    # Permanent redirect ALL requests to sostcore.com
    return 301 https://sostcore.com$request_uri;
}

