# /rpc/public — Unauthenticated RPC proxy for web wallet users
#
# This endpoint injects RPC credentials server-side so web wallet
# users can read chain data and broadcast transactions WITHOUT
# needing to know the RPC username/password.
#
# SAFE METHODS (allowed without user auth):
#   getinfo, getblockcount, getblockhash, getblock,
#   getaddressutxos, getaddressinfo, getaddressbalance,
#   getmempoolinfo, sendrawtransaction, estimatefee
#
# DANGEROUS METHODS (NEVER expose without auth):
#   dumpprivkey, stop, setgenerate, addnode, importprivkey
#
# INSTALLATION:
#   1. Edit the Authorization header below with your real RPC credentials:
#      echo -n 'YOUR_RPC_USER:YOUR_RPC_PASS' | base64
#   2. Add this location block INSIDE both server blocks in
#      /etc/nginx/sites-available/sost-explorer (for sostcore.com AND sostprotocol.com)
#   3. Place it BEFORE the existing "location /rpc" block
#   4. Test: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
#   6. Verify: curl -s -X POST https://sostcore.com/rpc/public \
#        -H "Content-Type: application/json" \
#        -d '{"jsonrpc":"2.0","method":"getinfo","params":[],"id":1}'

# --- ADD THIS BLOCK INSIDE BOTH SERVER BLOCKS ---

location /rpc/public {
    # Only POST and OPTIONS allowed
    limit_except POST OPTIONS {
        deny all;
    }

    # CORS preflight
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        return 204;
    }

    # Proxy to node WITH credentials injected server-side
    # CHANGE THIS: replace with base64(your_rpc_user:your_rpc_pass)
    # Generate with: echo -n 'sost:YOUR_PASS' | base64
    proxy_pass http://127.0.0.1:18232/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Authorization "Basic c29zdDo=";  # CHANGE THIS
    proxy_hide_header WWW-Authenticate;

    # Rate limiting (stricter than authenticated /rpc)
    limit_req zone=rpc burst=5 nodelay;

    # CORS headers
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Size limit to prevent abuse
    client_max_body_size 16k;
}

# --- END OF BLOCK ---
#
# NOTE: The RPC method filtering (which methods are allowed) should be
# implemented either:
#   a) In the SOST node itself (whitelist mode for unauthenticated requests)
#   b) Via an nginx lua module or middleware
#   c) In the wallet JS (only call safe methods on /rpc/public)
#
# For now, the wallet JS only calls safe read methods + sendrawtransaction
# on /rpc/public. The node will reject dangerous methods that require
# additional authentication.
