name: V14 Fork Safety

# Phase A / A5 of docs/V14_EXECUTION_PLAN.md — runs the V14 consensus safety
# pins on every push/PR so a fork-gating constant cannot drift, and the H3/H4
# block-validation semantics cannot regress, without CI going red.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  v14-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libsecp256k1-dev

      - name: Configure
        # libsecp256k1-dev is REQUIRED even for the safety tests: the sost-core
        # library always compiles src/tx_signer.cpp, which includes <secp256k1.h>
        # and uses the (always-present) ECDSA APIs, and links -lsecp256k1.
        # SBPOW stays OFF: the safety tests don't need the Schnorr path, and the
        # stock Ubuntu package has no schnorrsig module (SBPOW=ON would
        # FATAL_ERROR at configure). Base ECDSA is all tx_signer needs.
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSOST_ENABLE_PHASE2_SBPOW=OFF

      - name: Build V14 safety tests
        run: |
          cmake --build build --target test-v14-fork-gates -j2
          cmake --build build --target test-v14-h3-h4 -j2
          cmake --build build --target test-gv-slice1-activation -j2
          cmake --build build --target test-v13-gold-vault-slice1 -j2
          cmake --build build --target test-gv-g4 -j2
          cmake --build build --target test-gv-slice1-block -j2

      - name: Run V14 fork-gate pins (constants must not drift)
        run: ./build/test-v14-fork-gates

      - name: Run V14 H3/H4 block-validation semantics
        run: ./build/test-v14-h3-h4

      - name: Run Gold Vault Slice 1 config + regression + G4 tally
        run: |
          ./build/test-gv-slice1-activation
          ./build/test-v13-gold-vault-slice1
          ./build/test-gv-g4
          ./build/test-gv-slice1-block

  # Best-effort full suite. Allowed to fail (informational) until all deps are
  # pinned in CI; the v14-safety job above is the hard gate.
  full-ctest:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libsecp256k1-dev
      - name: Configure + build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSOST_ENABLE_PHASE2_SBPOW=OFF
          cmake --build build -j2
      - name: ctest
        run: ctest --test-dir build --output-on-failure
